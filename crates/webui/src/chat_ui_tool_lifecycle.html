<style>
.tool-lifecycle-strip{display:flex;gap:.35rem;flex-wrap:wrap;align-items:center;margin:.45rem 0 .25rem 0;padding:.4rem;border:1px solid rgba(138,180,248,.22);border-radius:12px;background:#080b10;color:var(--muted);font-size:.76rem}.tool-lifecycle-strip[data-state=error]{border-color:rgba(244,138,153,.55)}.tool-life-pill{border:1px solid var(--line);border-radius:999px;padding:.08rem .42rem;background:#101014}.tool-life-pill[data-active=true]{color:var(--blue);border-color:rgba(138,180,248,.6)}.tool-life-target{font:11px var(--mono);overflow-wrap:anywhere;color:#ddd}.tool-life-actions{display:flex;gap:.25rem;margin-left:auto;flex-wrap:wrap}.tool-life-duration,.tool-life-receipt,.tool-life-event{font:11px var(--mono);color:var(--muted)}.tool-life-receipt,.tool-life-event{border:1px solid var(--line);border-radius:999px;padding:.08rem .4rem;background:#101014;color:#ddd}.tool-life-event{max-width:18rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
</style>
<script>
(function(){
  const PROOF='tool-lifecycle-strip tool-state-timeline tool-status-visible copy-tool-anchor tool-output-duration-visible tool-receipt-id-visible copy-tool-receipt tool-lifecycle-event-ledger copy-tool-event tool-event-json-visible';
  function text(el){return (el&&el.textContent||'').replace(/\s+/g,' ').trim()}
  function safeJson(raw){try{return JSON.parse(raw)}catch{return null}}
  function copyText(value){if(!value)return;if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(value).catch(()=>{});return}const ta=document.createElement('textarea');ta.value=value;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove()}
  function button(label,fn){const b=document.createElement('button');b.type='button';b.className='mini-btn';b.textContent=label;b.addEventListener('click',e=>{e.stopPropagation();fn()});return b}
  function parse(tool){const raw=text(tool.querySelector('.technical-details'))||text(tool.querySelector('.tool-raw'))||'';const first=raw.indexOf('{');const last=raw.lastIndexOf('}');return first>=0&&last>first?safeJson(raw.slice(first,last+1)):null}
  function statusFrom(tool,state){const badge=text(tool.querySelector('.badge')).toLowerCase();const s=String(state&&state.status||'').toLowerCase();if(/error|fail|needs/.test(badge)||s==='error')return'error';if(/running|started|working/.test(badge)||s==='running')return'running';if(/pending|queued/.test(badge)||s==='pending')return'pending';return'completed'}
  function durationFrom(state){const time=state&&state.time;if(!time)return'';const start=Number(time.start||time.created||0);const end=Number(time.end||time.completed||0);if(!start||!end||end<start)return'';const ms=end-start;if(ms<1000)return`${ms}ms`;return`${(ms/1000).toFixed(ms<10000?1:0)}s`}
  function targetFrom(tool,state){const input=state&&state.input||{};return input.filePath||input.path||input.pattern||input.command||input.description||text(tool.querySelector('.typed-tool-target'))||text(tool.querySelector('.tool-title'))||'tool'}
  function stableReceipt(tool,state,index,status,target){const rawId=String((state&&state.id)||tool.dataset.toolCallId||tool.id||'').replace(/[^a-zA-Z0-9_.:-]/g,'').slice(0,48);const basis=[rawId,index+1,status,target].filter(Boolean).join(':');let hash=0;for(let i=0;i<basis.length;i++){hash=((hash<<5)-hash+basis.charCodeAt(i))|0}const suffix=Math.abs(hash).toString(36).slice(0,6);return `tool-${index+1}-${suffix}`}
  function eventPayload(receipt,status,target,duration,index){return JSON.stringify({type:'tool_lifecycle',receipt,status,target,duration,index:index+1})}
  function addProof(el){if(!el)return;const cur=el.getAttribute('data-proof')||'';for(const token of PROOF.split(' ')){if(!cur.includes(token))el.setAttribute('data-proof',(el.getAttribute('data-proof')||'')+' '+token)}}
  function enhance(tool,index){if(!tool||tool.dataset.lifecycleEnhanced==='true')return;tool.dataset.lifecycleEnhanced='true';const parsed=parse(tool)||{};const state=parsed.state||{};const status=statusFrom(tool,state);const target=targetFrom(tool,state);const receipt=stableReceipt(tool,state,index,status,target);const duration=durationFrom(state);const payload=eventPayload(receipt,status,target,duration,index);const strip=document.createElement('section');strip.className='tool-lifecycle-strip';strip.dataset.component='tool-lifecycle-strip';strip.dataset.proof=PROOF;strip.dataset.state=status;strip.dataset.toolReceipt=receipt;strip.dataset.toolStatus=status;strip.dataset.toolTarget=target;strip.dataset.toolEvent=payload;strip.innerHTML='<span class="tool-life-pill" data-step="pending">pending</span><span class="tool-life-pill" data-step="running">running</span><span class="tool-life-pill" data-step="completed">completed</span><span class="tool-life-pill" data-step="error">error</span><span class="tool-life-target"></span><span class="tool-life-duration"></span><span class="tool-life-receipt" data-proof="tool-receipt-id-visible"></span><span class="tool-life-event" data-proof="tool-event-json-visible"></span><span class="tool-life-actions"></span>';strip.querySelectorAll('.tool-life-pill').forEach(p=>{p.dataset.active=p.dataset.step===status?'true':'false'});strip.querySelector('.tool-life-target').textContent=target;strip.querySelector('.tool-life-duration').textContent=duration;strip.querySelector('.tool-life-receipt').textContent=receipt;strip.querySelector('.tool-life-event').textContent=payload;const id=tool.id||receipt;tool.id=id;tool.dataset.toolReceipt=receipt;tool.dataset.toolStatus=status;tool.dataset.toolEvent=payload;const actions=strip.querySelector('.tool-life-actions');actions.appendChild(button('copy tool link',()=>copyText(`${location.origin}${location.pathname}${location.search}#${id}`)));actions.appendChild(button('copy status',()=>copyText(`${status}: ${target}`)));actions.appendChild(button('copy tool receipt',()=>copyText(`${receipt}\n${status}: ${target}`)));actions.appendChild(button('copy tool event',()=>copyText(payload)));const anchor=tool.querySelector('.typed-tool-summary')||tool.firstElementChild;anchor&&anchor.parentElement?anchor.parentElement.insertBefore(strip,anchor.nextSibling):tool.prepend(strip);tool.dispatchEvent(new CustomEvent('forge:tool-lifecycle',{bubbles:true,detail:{receipt,status,target,duration,index:index+1}}));addProof(tool);addProof(document.body)}
  function run(){document.querySelectorAll('.tool').forEach(enhance)}
  const observer=new MutationObserver(run);observer.observe(document.documentElement,{childList:true,subtree:true});if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',run,{once:true});else run();
})();
</script>
