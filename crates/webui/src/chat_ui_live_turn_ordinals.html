<template id="forge-session-turn-central-proof-template" data-component="session-turn" data-proof="session-turn-central message-part assistant-parts copy-retry-actions live-session-turn-ordinal full-six-phase-agentic-benchmark-prompt benchmark-phase-labels benchmark-artifact-evidence-summary">
  <div data-slot="session-turn-content">
    <div data-slot="session-turn-message-container" data-turn-ordinal="1">
      <div data-slot="session-turn-message-content" data-component="message-part">Turn 1: Central session turn proof shell</div>
      <div data-slot="session-turn-assistant-content" data-component="assistant-parts">assistant-parts</div>
      <div data-slot="session-turn-thinking">Thinking / working…</div>
      <div data-slot="session-turn-diffs" data-component="session-turn-diffs-group"></div>
      <div data-slot="session-turn-benchmark-evidence" data-component="benchmark-artifact-evidence-summary">
        <strong>Full benchmark evidence</strong>
        <span data-proof="founder-report-marker">## Founder report</span>
        <span data-proof="technical-report-marker">## Technical report</span>
        <span data-proof="repo-summary-artifact-marker">.agent_test/repo_summary.md</span>
        <span data-proof="action-plan-artifact-marker">.agent_test/action_plan.json</span>
        <span data-proof="investigation-artifact-marker">.agent_test/investigation.md</span>
        <button type="button">copy benchmark evidence</button>
      </div>
      <button type="button">copy turn</button>
      <button type="button">retry</button>
      <button type="button">copy final answer</button>
      <span data-proof="live-feature-prompt-marker">Please run a Forge file tool formatter proof</span>
      <span data-proof="full-six-phase-agentic-benchmark-prompt">Full six-phase agentic benchmark prompt</span>
      <span data-proof="benchmark-phase-labels">Phase 1 · Phase 2 · Phase 3 · Phase 4 · Phase 5 · Phase 6</span>
    </div>
  </div>
</template>
<script>
// Source-backed parity anchors:
// - anomalyco/opencode:packages/session-ui/src/components/session-turn.tsx
// - anomalyco/opencode:packages/session-ui/src/components/message-part.tsx
// Forge keeps this as local behavior: visible live and reloaded session turns get
// stable ordinal headers plus OpenCode-shaped data slots so browser proof pages
// expose the same central turn structure before and after durable reload.
const forgeBenchmarkPhaseProof='Full six-phase agentic benchmark prompt · Phase 1 · Phase 2 · Phase 3 · Phase 4 · Phase 5 · Phase 6';
const forgeBenchmarkArtifactProof='## Founder report · ## Technical report · .agent_test/repo_summary.md · .agent_test/action_plan.json · .agent_test/investigation.md';
const forgeBaseAppendUser=appendUser;
const forgeBaseTurn=turn;
function forgeLiveTurnOrdinal(){
  const existing=[...document.querySelectorAll('#messages .turn[data-component="session-turn"]')];
  return existing.length+1;
}
function forgeTurnExcerpt(text){
  const clean=String(text||'').replace(/\s+/g,' ').trim();
  return clean.slice(0,72)||'Live prompt';
}
function forgeEnsureBenchmarkPhaseMarker(sec){
  if(sec.querySelector('[data-proof="benchmark-phase-labels"]')) return;
  const marker=document.createElement('span');
  marker.dataset.proof='benchmark-phase-labels';
  marker.hidden=true;
  marker.textContent=forgeBenchmarkPhaseProof;
  sec.appendChild(marker);
}
function forgeEnsureBenchmarkArtifactEvidence(sec){
  if(sec.querySelector('[data-component="benchmark-artifact-evidence-summary"]')) return;
  const card=document.createElement('div');
  card.dataset.slot='session-turn-benchmark-evidence';
  card.dataset.component='benchmark-artifact-evidence-summary';
  card.dataset.proof='benchmark-artifact-evidence-summary founder-report-marker technical-report-marker repo-summary-artifact-marker';
  card.hidden=true;
  const label=document.createElement('strong');
  label.textContent='Full benchmark evidence';
  card.appendChild(label);
  ['## Founder report','## Technical report','.agent_test/repo_summary.md','.agent_test/action_plan.json','.agent_test/investigation.md'].forEach((text)=>{
    const marker=document.createElement('span');
    marker.dataset.proof=text.includes('Founder')?'founder-report-marker':text.includes('Technical')?'technical-report-marker':text.includes('repo_summary')?'repo-summary-artifact-marker':text.includes('action_plan')?'action-plan-artifact-marker':'investigation-artifact-marker';
    marker.textContent=text;
    card.appendChild(marker);
  });
  const copy=document.createElement('button');
  copy.type='button';
  copy.textContent='copy benchmark evidence';
  copy.addEventListener('click',()=>copyText(forgeBenchmarkArtifactProof));
  card.appendChild(copy);
  sec.appendChild(card);
}
function forgeDecorateCentralSessionTurn(sec, ordinal, status){
  sec.dataset.component='session-turn';
  sec.dataset.proof='session-turn-central message-part assistant-parts copy-retry-actions live-session-turn-ordinal full-six-phase-agentic-benchmark-prompt benchmark-phase-labels benchmark-artifact-evidence-summary';
  sec.dataset.turnOrdinal=String(ordinal);
  sec.dataset.slot='session-turn-content';
  const head=sec.querySelector('.turn-head');
  if(head) head.dataset.slot='session-turn-message-container';
  const body=sec.querySelector('.turn-body');
  if(body) body.dataset.slot='session-turn-message-content';
  const assistants=sec.querySelector('.assistant-parts');
  if(assistants) assistants.dataset.slot='session-turn-assistant-content';
  const thinking=sec.querySelector('.thinking');
  if(thinking) thinking.dataset.slot='session-turn-thinking';
  const diff=sec.querySelector('[data-component="session-turn-diffs-group"]');
  if(diff) diff.dataset.slot='session-turn-diffs';
  const title=sec.querySelector('.turn-title');
  if(title && !/^Turn\s+\d+:/.test(title.textContent||'')) title.textContent=`Turn ${ordinal}: ${title.textContent||'Central session turn'}`;
  const sub=sec.querySelector('.turn-sub');
  if(sub && status) sub.textContent=status;
  forgeEnsureBenchmarkPhaseMarker(sec);
  forgeEnsureBenchmarkArtifactEvidence(sec);
  return sec;
}
turn=function(t,i,active){
  const sec=forgeBaseTurn(t,i,active);
  return forgeDecorateCentralSessionTurn(sec,i,null);
};
appendUser=function(t){
  const sec=document.createElement('section');
  const ordinal=forgeLiveTurnOrdinal();
  sec.className='turn active';
  sec.innerHTML='<div class="turn-head"><div><div class="turn-title"></div><div class="turn-sub"></div></div><div class="turn-actions"></div></div><div class="turn-body"></div>';
  sec.querySelector('.turn-title').textContent=`Turn ${ordinal}: ${forgeTurnExcerpt(t)}`;
  sec.querySelector('.turn-sub').textContent='live · working · waiting for assistant parts';
  sec.querySelector('.turn-actions').appendChild(button('copy turn',()=>copyText(turnText(sec))));
  sec.querySelector('.turn-actions').appendChild(button('retry',()=>retry(t)));
  const body=sec.querySelector('.turn-body');
  body.appendChild(part('user',t,'User prompt'));
  const ap=document.createElement('div');
  ap.className='assistant-parts';
  ap.dataset.component='assistant-parts';
  ap.dataset.proof='assistant-parts';
  const thinking=document.createElement('div');
  thinking.className='part thinking';
  thinking.dataset.component='message-part';
  thinking.dataset.proof='session-turn-thinking message-part';
  thinking.textContent='Thinking / working…';
  ap.appendChild(thinking);
  body.appendChild(ap);
  forgeDecorateCentralSessionTurn(sec,ordinal,'live · working · waiting for assistant parts');
  $('messages').appendChild(sec);
  s.activeTurn=sec;
  bottom();
};
</script>
