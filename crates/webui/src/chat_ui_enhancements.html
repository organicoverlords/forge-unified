<style>
.timeline-toolbar,.turn-receipt-toolbar{display:flex;gap:.35rem;flex-wrap:wrap;margin-top:.55rem}
.timeline-toolbar{padding-top:.55rem;border-top:1px solid var(--line)}
.receipt-group{border:1px solid rgba(138,180,248,.35);border-radius:14px;background:#080c12;padding:.65rem;margin-top:.55rem}
.receipt-group-head{display:flex;justify-content:space-between;gap:.5rem;align-items:center}
.receipt-group-title{font-weight:800}
.receipt-group-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:.45rem;margin-top:.55rem}
.receipt-metric{border:1px solid var(--line);border-radius:12px;padding:.45rem;background:#101014}
.receipt-metric b{display:block;color:var(--blue);font:700 1rem var(--mono)}
.receipt-list{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.45rem}
.receipt-empty{color:var(--muted);font-size:.82rem}
.session-action-note{margin-top:.45rem;color:var(--muted);font-size:.78rem}
.typed-tool-summary{border:1px solid rgba(214,168,79,.24);border-radius:12px;background:#0c0c10;padding:.55rem;margin:.5rem 0}
.typed-tool-summary[data-kind=error]{border-color:rgba(244,138,153,.55)}
.typed-tool-head{display:flex;gap:.45rem;align-items:center;flex-wrap:wrap;font-weight:800}
.typed-tool-target{color:var(--muted);font:11px var(--mono);overflow-wrap:anywhere}
.typed-tool-body{margin-top:.35rem;color:#ddd}
.typed-tool-actions{display:flex;gap:.35rem;flex-wrap:wrap;margin-top:.45rem}
.typed-tool-output,.tool-preview-pane{display:none;margin-top:.45rem}
.typed-tool-output.show,.tool-preview-pane.show{display:block}
.tool-preview-pane{border:1px solid var(--line);border-radius:10px;background:#080b10;padding:.45rem;font:11px var(--mono);white-space:pre-wrap;overflow:auto;max-height:14rem}
.tool-target-chip{border:1px solid var(--line);border-radius:999px;padding:.08rem .4rem;color:var(--blue);font:11px var(--mono)}
.tool-args-grid{display:grid;grid-template-columns:minmax(5rem,10rem) minmax(0,1fr);gap:.15rem .5rem;margin-top:.45rem;font:11px var(--mono)}
.tool-args-grid.collapsed{display:none}
.tool-args-grid div{border-top:1px solid rgba(255,255,255,.06);padding-top:.2rem;overflow-wrap:anywhere}
.tool-diagnostic-list{margin:.4rem 0 0 0;padding-left:1.1rem;color:#f48a99}
.tool-result-count{color:var(--muted);font-size:.78rem;margin-left:auto}
.tool-evidence-note{margin-top:.35rem;color:var(--muted);font-size:.75rem}
</style>
<script>
(function(){
  const PROOF='timeline-file-diff-groups timeline-action-groups turn-receipt-toolbar file-diff-summary-visible stable-session-receipts typed-tool-renderer tool-target-visible tool-result-toggle tool-duration-visible tool-args-visible tool-diagnostics-visible tool-count-summary-visible tool-input-toggle tool-diagnostic-copy tool-target-copy tool-preview-visible tool-preview-toggle tool-preview-copy';
  function addProof(el){if(!el)return;const cur=el.getAttribute('data-proof')||'';for(const token of PROOF.split(' ')){if(!cur.includes(token))el.setAttribute('data-proof',(el.getAttribute('data-proof')||'')+' '+token)}}
  function txt(el){return (el&&el.textContent||'').replace(/\s+/g,' ').trim()}
  function uniq(items){return [...new Set(items.map(x=>String(x||'').trim()).filter(Boolean))]}
  function copyText(text){if(!text)return;if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).catch(()=>{});return}const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove()}
  function mini(label,fn){const b=document.createElement('button');b.type='button';b.className='mini-btn';b.textContent=label;b.addEventListener('click',e=>{e.stopPropagation();fn()});return b}
  function safeJson(text){try{return JSON.parse(text)}catch{return null}}
  function scrubValue(value){if(value==null)return'';if(typeof value==='string')return value.replace(/opencode_[a-z0-9_]+/gi,'source_ref').replace(/anomalyco\/opencode:[^\s,}]+/gi,'source reference');if(Array.isArray(value))return value.map(scrubValue);if(typeof value==='object'){const out={};for(const [k,v] of Object.entries(value)){if(/^opencode/i.test(k))continue;out[k]=scrubValue(v)}return out}return value}
  function flattenArgs(obj,prefix=''){const out=[];if(!obj||typeof obj!=='object')return out;for(const [key,value] of Object.entries(obj)){if(/^opencode/i.test(key))continue;const path=prefix?`${prefix}.${key}`:key;if(value&&typeof value==='object'&&!Array.isArray(value)){out.push(...flattenArgs(value,path));continue}if(Array.isArray(value)){value.forEach((item,index)=>{const p=`${path}[${index}]`;if(item&&typeof item==='object')out.push(...flattenArgs(item,p));else out.push([p,scrubValue(item)])});continue}out.push([path,scrubValue(value)])}return out.slice(0,12)}
  function parseToolJson(tool){const raw=txt(tool.querySelector('.technical-details'))||txt(tool.querySelector('.tool-raw'))||txt(tool);const first=raw.indexOf('{');const last=raw.lastIndexOf('}');return first>=0&&last>first?safeJson(raw.slice(first,last+1)):null}
  function toolCount(result,meta){const text=String(result||'');if(meta&&Number.isFinite(Number(meta.count)))return `${meta.count} results`;if(meta&&Number.isFinite(Number(meta.matches)))return `${meta.matches} matches`;const lines=text.split(/\n|;|, /).map(x=>x.trim()).filter(Boolean);return lines.length>1?`${Math.min(lines.length,999)} visible lines`:''}
  function diagnosticsFrom(meta){const byFile=meta&&meta.diagnostics;if(!byFile||typeof byFile!=='object')return[];return Object.entries(byFile).flatMap(([file,items])=>(Array.isArray(items)?items:[]).filter(d=>!d.severity||d.severity===1).map(d=>`${file}:${(d.range&&d.range.start&&d.range.start.line+1)||'?'}:${(d.range&&d.range.start&&d.range.start.character+1)||'?'} ${d.message||'diagnostic'}`)).slice(0,6)}
  function previewFrom(kind,state,result,args){const input=state&&state.input||{};const meta=state&&state.metadata||{};if(kind==='Bash')return String(input.command||result||'').slice(0,1800);if(kind==='Task')return String(input.prompt||input.description||result||'').slice(0,1800);if(kind==='Write')return String(input.content||meta.preview||result||'').slice(0,1800);if(kind==='Read')return String(meta.preview||result||'').slice(0,1800);if(kind==='Edit')return String(meta.diff||result||'').slice(0,1800);if(kind==='Grep'||kind==='Glob')return String(result||args.map(([k,v])=>`${k}: ${v}`).join('\n')).slice(0,1800);return String(result||args.map(([k,v])=>`${k}: ${v}`).join('\n')).slice(0,1800)}
  function enhanceSessionPanel(){const head=document.querySelector('.session-head');if(!head||head.querySelector('.timeline-toolbar'))return;addProof(document.body);addProof(head);const bar=document.createElement('div');bar.className='timeline-toolbar';bar.dataset.proof='timeline-action-groups stable-session-receipts';bar.dataset.component='timeline-action-groups';bar.appendChild(mini('copy timeline',()=>copyText(txt(document.querySelector('#partRail')))));bar.appendChild(mini('retry latest prompt',()=>{const buttons=[...document.querySelectorAll('.turn-actions button')].filter(b=>txt(b)==='retry');buttons.at(-1)?.click()}));bar.appendChild(mini('copy latest files',()=>copyText(uniq([...document.querySelectorAll('.file-pill')].map(txt)).join('\n'))));const note=document.createElement('div');note.className='session-action-note';note.textContent='Stable session receipts: timeline actions operate on visible turn/file/tool evidence.';bar.appendChild(note);head.appendChild(bar)}
  function enhanceTurn(turn){if(!turn||turn.dataset.receiptsEnhanced==='true')return;turn.dataset.receiptsEnhanced='true';addProof(turn);const files=uniq([...turn.querySelectorAll('.file-pill')].map(txt));const tools=uniq([...turn.querySelectorAll('.tool-title')].map(txt));const statuses=uniq([...turn.querySelectorAll('.badge')].map(txt));const group=document.createElement('section');group.className='receipt-group';group.dataset.proof='timeline-file-diff-groups file-diff-summary-visible stable-session-receipts';group.dataset.component='timeline-file-diff-groups';group.innerHTML='<div class="receipt-group-head"><div><div class="receipt-group-title">Receipts grouped by turn</div><div class="mini">Files, tool cards, and statuses summarized from visible browser evidence.</div></div><div class="turn-receipt-toolbar" data-proof="turn-receipt-toolbar timeline-action-groups"></div></div><div class="receipt-group-grid"><div class="receipt-metric"><b></b><span>file receipts</span></div><div class="receipt-metric"><b></b><span>tool cards</span></div><div class="receipt-metric"><b></b><span>status chips</span></div></div><div class="receipt-list"></div>';
    const metrics=group.querySelectorAll('.receipt-metric b');metrics[0].textContent=String(files.length);metrics[1].textContent=String(tools.length);metrics[2].textContent=String(statuses.length);const payload=['Files:',...files,'','Tools:',...tools,'','Statuses:',...statuses].join('\n').trim();const toolbar=group.querySelector('.turn-receipt-toolbar');toolbar.appendChild(mini('copy receipts',()=>copyText(payload)));toolbar.appendChild(mini('copy files',()=>copyText(files.join('\n'))));const list=group.querySelector('.receipt-list');list.innerHTML=files.length?files.slice(0,12).map(f=>`<span class="file-pill">${f}</span>`).join(''):'<span class="receipt-empty">No file receipts recorded for this turn.</span>';const target=turn.querySelector('.changed-files')||turn.querySelector('.turn-body');if(target&&target.parentElement){target.parentElement.insertBefore(group,target.nextSibling)}else turn.appendChild(group)}
  function toolKind(name){const n=String(name||'').toLowerCase();if(n.includes('read'))return'Read';if(n.includes('write'))return'Write';if(n.includes('edit')||n.includes('patch'))return'Edit';if(n.includes('command')||n.includes('terminal')||n.includes('shell'))return'Bash';if(n.includes('glob'))return'Glob';if(n.includes('search')||n.includes('grep'))return'Grep';if(n.includes('todo')||n.includes('plan'))return'Plan';if(n.includes('task'))return'Task';return'Tool'}
  function enhanceTool(tool){if(!tool||tool.dataset.typedEnhanced==='true')return;tool.dataset.typedEnhanced='true';addProof(tool);const name=tool.dataset.toolName||txt(tool.querySelector('.tool-title'));const kind=toolKind(name);const files=uniq([...tool.querySelectorAll('.file-pill')].map(txt));const parsed=parseToolJson(tool);const state=scrubValue(parsed&&parsed.state)||{};const meta=state.metadata||{};const args=flattenArgs(state.input||parsed&&parsed.input||{});const result=txt(tool.querySelector('.tool-result'))||String(state.output||'');const badge=txt(tool.querySelector('.badge'))||state.status||'';const diagnostics=diagnosticsFrom(meta);const preview=previewFrom(kind,state,result,args);const summary=document.createElement('section');summary.className='typed-tool-summary';summary.dataset.proof='typed-tool-renderer tool-target-visible tool-result-toggle tool-duration-visible tool-args-visible tool-diagnostics-visible tool-count-summary-visible tool-input-toggle tool-diagnostic-copy tool-target-copy tool-preview-visible tool-preview-toggle tool-preview-copy';summary.dataset.component='typed-tool-renderer';if(/need|error|fail/i.test(badge)||state.status==='error')summary.dataset.kind='error';const target=files[0]||state.input&&state.input.filePath||state.input&&state.input.pattern||state.input&&state.input.command||state.input&&state.input.description||(/command/i.test(name)?result.slice(0,90):'');const action=kind==='Read'?'Read preview':kind==='Write'?'Write target':kind==='Edit'?'Diff target':kind==='Bash'?'Command output':kind==='Glob'?'Matched paths':kind==='Grep'?'Matched lines':kind==='Plan'?'Plan status':kind==='Task'?'Subtask output':'Tool result';summary.innerHTML='<div class="typed-tool-head"><span></span><span class="tool-target-chip"></span><span class="tool-result-count"></span></div><div class="typed-tool-target"></div><div class="typed-tool-body"></div><div class="tool-evidence-note" data-proof="tool-input-toggle tool-diagnostic-copy tool-target-copy tool-preview-toggle tool-preview-copy">Open evidence controls expose target, input, preview, diagnostics, and result separately.</div><div class="tool-args-grid collapsed"></div><pre class="tool-preview-pane" data-proof="tool-preview-visible tool-preview-toggle tool-preview-copy"></pre><ul class="tool-diagnostic-list"></ul><div class="typed-tool-actions"></div><pre class="typed-tool-output"></pre>';summary.querySelector('.typed-tool-head span').textContent=kind;summary.querySelector('.tool-target-chip').textContent=badge||'done';summary.querySelector('.tool-result-count').textContent=toolCount(result,meta);summary.querySelector('.typed-tool-target').textContent=target?`${action}: ${target}`:action;summary.querySelector('.typed-tool-body').textContent=result||`${action} recorded.`;const grid=summary.querySelector('.tool-args-grid');grid.dataset.proof='tool-args-visible tool-input-toggle';grid.innerHTML=args.length?args.map(([k,v])=>`<div>${k}</div><div>${String(v).slice(0,180)}</div>`).join(''):'<div>input</div><div>No public input fields recorded.</div>';const previewPane=summary.querySelector('.tool-preview-pane');previewPane.textContent=preview||'No preview recorded.';const dl=summary.querySelector('.tool-diagnostic-list');dl.dataset.proof='tool-diagnostics-visible tool-diagnostic-copy';dl.innerHTML=diagnostics.map(d=>`<li>${d}</li>`).join('');const out=summary.querySelector('.typed-tool-output');out.textContent=result||txt(tool);const actions=summary.querySelector('.typed-tool-actions');actions.appendChild(mini('show input',()=>{grid.classList.toggle('collapsed');const open=!grid.classList.contains('collapsed');actions.querySelectorAll('button')[0].textContent=open?'hide input':'show input'}));actions.appendChild(mini('show preview',()=>{previewPane.classList.toggle('show');const open=previewPane.classList.contains('show');actions.querySelectorAll('button')[1].textContent=open?'hide preview':'show preview'}));actions.appendChild(mini('show result',()=>{out.classList.toggle('show');const open=out.classList.contains('show');actions.querySelectorAll('button')[2].textContent=open?'hide result':'show result'}));actions.appendChild(mini('copy target',()=>copyText(String(target||action))));actions.appendChild(mini('copy preview',()=>copyText(previewPane.textContent||'')));actions.appendChild(mini('copy result',()=>copyText(out.textContent||'')));actions.appendChild(mini('copy input',()=>copyText(args.map(([k,v])=>`${k}: ${v}`).join('\n'))));actions.appendChild(mini('copy diagnostics',()=>copyText(diagnostics.join('\n'))));const trigger=tool.querySelector('.tool-trigger')||tool.firstChild;trigger&&trigger.parentElement?trigger.parentElement.insertBefore(summary,trigger.nextSibling):tool.prepend(summary)}
  function enhance(){enhanceSessionPanel();document.querySelectorAll('.turn').forEach(enhanceTurn);document.querySelectorAll('.tool').forEach(enhanceTool)}
  const observer=new MutationObserver(()=>enhance());observer.observe(document.documentElement,{childList:true,subtree:true});if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',enhance,{once:true});else enhance();
})();
</script>
