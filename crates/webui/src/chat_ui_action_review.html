<style>
.action-review-chip{border:1px solid rgba(138,180,248,.35);border-radius:999px;padding:.1rem .45rem;font:12px var(--mono);color:var(--muted)}
.action-review-chip[data-complete="true"]{color:var(--ok);border-color:rgba(143,209,143,.55)}
.action-summary-review{display:flex;align-items:center;gap:.35rem;color:var(--muted);font:12px var(--mono)}
.action-summary-review input{accent-color:#8ab4f8}
.action-summary-card[data-action-reviewed="true"]{box-shadow:0 0 0 1px rgba(138,180,248,.25)}
.action-summary-card[data-action-review-hidden="true"]{display:none!important}
.action-review-rail{display:flex;flex-wrap:wrap;gap:.35rem;margin:.45rem 0 0;color:var(--muted);font:12px var(--mono)}
.action-review-rail button{border:1px solid rgba(138,180,248,.25);border-radius:999px;background:rgba(138,180,248,.06);color:var(--text);padding:.15rem .45rem;cursor:pointer}
.action-review-rail button[data-empty="true"]{color:var(--ok);border-color:rgba(143,209,143,.45)}
.action-review-rail-more{border:1px dashed rgba(138,180,248,.25);border-radius:999px;padding:.15rem .45rem}
.action-review-mode{display:flex;align-items:center;gap:.35rem;margin:.35rem 0 0;color:var(--muted);font:12px var(--mono)}
.action-review-mode button{border:1px solid rgba(138,180,248,.25);border-radius:999px;background:rgba(138,180,248,.06);color:var(--text);padding:.15rem .45rem;cursor:pointer}
.action-review-mode button[aria-pressed="true"]{color:var(--ok);border-color:rgba(143,209,143,.55)}
</style>
<script>
(function(){
  const PROOF='action-review-checklist action-reviewed-count mark-visible-reviewed copy-reviewed-actions reviewed-action-summary reviewed-action-checkbox action-review-overflow-rail action-review-overflow-count focus-unreviewed-action copy-unreviewed-actions hide-reviewed-actions show-reviewed-actions reviewed-action-visibility-filter reviewed-action-hidden-count opencode-checkbox-parity opencode-message-action-parity opencode-showall-overflow-parity opencode-visible-filter-parity packages/session-ui/src/components/message-part.tsx packages/session-ui/src/components/tool-count-summary.tsx packages/session-ui/src/components/session-turn.tsx';
  function addProof(el){if(!el)return;const have=new Set(String(el.getAttribute('data-proof')||'').split(/\s+/).filter(Boolean));for(const token of PROOF.split(' '))have.add(token);el.setAttribute('data-proof',[...have].join(' '))}
  function text(el){return (el&&el.textContent||'').replace(/\s+/g,' ').trim()}
  function copy(value){if(!value)return;if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(value).catch(()=>{});return}const ta=document.createElement('textarea');ta.value=value;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove()}
  function cards(scope){return [...scope.querySelectorAll('.action-summary-card')]}
  function visibleCards(scope){return cards(scope).filter(card=>card.dataset.actionFilterHidden!=='true'&&card.dataset.actionReviewHidden!=='true')}
  function filteredSourceCards(scope){return cards(scope).filter(card=>card.dataset.actionFilterHidden!=='true')}
  function reviewedCards(scope){return filteredSourceCards(scope).filter(card=>card.dataset.actionReviewed==='true')}
  function unreviewedCards(scope){return filteredSourceCards(scope).filter(card=>card.dataset.actionReviewed!=='true')}
  function cardLabel(card){return card.dataset.actionLabel||text(card.querySelector('.action-summary-title'))||'Tool'}
  function cardTarget(card){return card.dataset.actionTarget||text(card.querySelector('.action-summary-target'))||'No target shown'}
  function reviewedText(scope){const reviewed=reviewedCards(scope);const source=reviewed.length?reviewed:visibleCards(scope);const lines=[`Reviewed action checklist: ${reviewed.length}/${cards(scope).length} reviewed`];source.slice(0,10).forEach((card,i)=>lines.push(`${i+1}. ${cardLabel(card)} — ${cardTarget(card)} — ${card.dataset.status||'ok'} — reviewed=${card.dataset.actionReviewed==='true'}`));return lines.join('\n')}
  function unreviewedText(scope){const source=unreviewedCards(scope);const lines=[`Unreviewed action backlog: ${source.length}/${filteredSourceCards(scope).length} visible unreviewed`];source.slice(0,12).forEach((card,i)=>lines.push(`${i+1}. ${cardLabel(card)} — ${cardTarget(card)} — ${card.dataset.status||'ok'}`));return lines.join('\n')}
  function focusCard(card){if(!card)return;card.dataset.actionReviewHidden='false';card.scrollIntoView({block:'center',behavior:'smooth'});card.tabIndex=-1;card.focus({preventScroll:true});card.dataset.actionReviewFocused='true'}
  function hideReviewed(scope){scope.dataset.actionReviewHideReviewed='true';filteredSourceCards(scope).forEach(card=>{card.dataset.actionReviewHidden=card.dataset.actionReviewed==='true'?'true':'false'})}
  function showReviewed(scope){scope.dataset.actionReviewHideReviewed='false';filteredSourceCards(scope).forEach(card=>{card.dataset.actionReviewHidden='false'})}
  function renderMode(scope,digest){let mode=digest.querySelector('.action-review-mode');if(!mode){mode=document.createElement('div');mode.className='action-review-mode';mode.dataset.proof='reviewed-action-visibility-filter hide-reviewed-actions show-reviewed-actions reviewed-action-hidden-count opencode-visible-filter-parity';digest.appendChild(mode)}mode.textContent='';const hidden=filteredSourceCards(scope).filter(card=>card.dataset.actionReviewHidden==='true').length;const hide=document.createElement('button');hide.type='button';hide.dataset.action='hide-reviewed-actions';hide.dataset.proof='hide-reviewed-actions reviewed-action-visibility-filter';hide.setAttribute('aria-pressed',scope.dataset.actionReviewHideReviewed==='true'?'true':'false');hide.textContent=`hide reviewed (${reviewedCards(scope).length})`;hide.addEventListener('click',e=>{e.stopPropagation();hideReviewed(scope);updateDigest(scope)});const show=document.createElement('button');show.type='button';show.dataset.action='show-reviewed-actions';show.dataset.proof='show-reviewed-actions reviewed-action-visibility-filter';show.setAttribute('aria-pressed',scope.dataset.actionReviewHideReviewed==='true'?'false':'true');show.textContent=`show reviewed`;show.addEventListener('click',e=>{e.stopPropagation();showReviewed(scope);updateDigest(scope)});const count=document.createElement('span');count.dataset.proof='reviewed-action-hidden-count';count.textContent=`${hidden} hidden`;mode.appendChild(hide);mode.appendChild(show);mode.appendChild(count)}
  function renderRail(scope,digest){let rail=digest.querySelector('.action-review-rail');if(!rail){rail=document.createElement('div');rail.className='action-review-rail';rail.dataset.proof='action-review-overflow-rail focus-unreviewed-action action-review-overflow-count opencode-showall-overflow-parity';digest.appendChild(rail)}rail.textContent='';const pending=unreviewedCards(scope);const head=pending.slice(0,4);if(!pending.length){const done=document.createElement('button');done.type='button';done.dataset.empty='true';done.textContent='all visible actions reviewed';done.dataset.proof='action-review-overflow-rail';rail.appendChild(done);return}head.forEach((card,index)=>{const btn=document.createElement('button');btn.type='button';btn.dataset.action='focus-unreviewed-action';btn.dataset.proof='focus-unreviewed-action';btn.textContent=`review ${index+1}: ${cardLabel(card)}`;btn.addEventListener('click',e=>{e.stopPropagation();focusCard(card)});rail.appendChild(btn)});const overflow=pending.length-head.length;if(overflow>0){const more=document.createElement('span');more.className='action-review-rail-more';more.dataset.proof='action-review-overflow-count';more.textContent=`+${overflow} more unreviewed`;rail.appendChild(more)}}
  function updateDigest(scope){const digest=scope.querySelector('.action-digest-card[data-owned-by="action-summaries"]');if(!digest)return;const total=cards(scope).length;const reviewed=reviewedCards(scope).length;let chip=digest.querySelector('.action-review-chip');if(!chip){chip=document.createElement('span');chip.className='action-review-chip';chip.dataset.proof='action-review-checklist action-reviewed-count';digest.querySelector('.action-summary-head')?.appendChild(chip)}chip.textContent=`${reviewed}/${total} reviewed`;chip.dataset.complete=total>0&&reviewed===total?'true':'false';const actions=digest.querySelector('.action-digest-actions');if(actions&&!actions.querySelector('[data-action="mark-visible-reviewed"]')){const mark=document.createElement('button');mark.type='button';mark.className='mini-btn';mark.textContent='mark visible reviewed';mark.dataset.action='mark-visible-reviewed';mark.dataset.proof='mark-visible-reviewed';mark.addEventListener('click',e=>{e.stopPropagation();visibleCards(scope).forEach(card=>{card.dataset.actionReviewed='true';const box=card.querySelector('input[data-action="review-action-summary"]');if(box)box.checked=true});updateDigest(scope)});actions.appendChild(mark);const copied=document.createElement('button');copied.type='button';copied.className='mini-btn';copied.textContent='copy reviewed actions';copied.dataset.action='copy-reviewed-actions';copied.dataset.proof='copy-reviewed-actions';copied.addEventListener('click',e=>{e.stopPropagation();copy(reviewedText(scope))});actions.appendChild(copied);const backlog=document.createElement('button');backlog.type='button';backlog.className='mini-btn';backlog.textContent='copy unreviewed actions';backlog.dataset.action='copy-unreviewed-actions';backlog.dataset.proof='copy-unreviewed-actions';backlog.addEventListener('click',e=>{e.stopPropagation();copy(unreviewedText(scope))});actions.appendChild(backlog)}renderMode(scope,digest);renderRail(scope,digest);addProof(digest);addProof(document.body)}
  function enhance(card){if(!card||card.dataset.actionReviewEnhanced==='true')return;card.dataset.actionReviewEnhanced='true';card.dataset.actionReviewed=card.dataset.actionReviewed||'false';card.dataset.actionReviewHidden=card.dataset.actionReviewHidden||'false';const actions=card.querySelector('.action-summary-actions');if(actions&&!actions.querySelector('[data-action="review-action-summary"]')){const label=document.createElement('label');label.className='action-summary-review';label.dataset.proof='reviewed-action-summary reviewed-action-checkbox opencode-checkbox-parity';const box=document.createElement('input');box.type='checkbox';box.dataset.action='review-action-summary';box.checked=card.dataset.actionReviewed==='true';box.addEventListener('change',()=>{card.dataset.actionReviewed=box.checked?'true':'false';const scope=card.closest('[data-component="session-turn"],.session-turn,.message,.assistant-message,.turn')||document.body;if(scope.dataset.actionReviewHideReviewed==='true')card.dataset.actionReviewHidden=box.checked?'true':'false';updateDigest(scope)});label.appendChild(box);label.appendChild(document.createTextNode('reviewed'));actions.appendChild(label)}addProof(card)}
  function run(){document.querySelectorAll('.action-summary-card').forEach(enhance);const scopes=new Set([...document.querySelectorAll('.action-summary-card')].map(card=>card.closest('[data-component="session-turn"],.session-turn,.message,.assistant-message,.turn')||document.body));scopes.forEach(scope=>{if(scope.dataset.actionReviewHideReviewed==='true')hideReviewed(scope);updateDigest(scope)})}
  const observer=new MutationObserver(run);observer.observe(document.documentElement,{childList:true,subtree:true,characterData:true});if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',run,{once:true});else run();
})();
</script>
