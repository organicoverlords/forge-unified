<style>
.action-summary-card{border:1px solid rgba(214,168,79,.32);border-radius:14px;background:linear-gradient(180deg,rgba(214,168,79,.10),rgba(255,255,255,.025));padding:.65rem;margin:.5rem 0;display:grid;gap:.45rem}
.action-summary-card[data-status=error]{border-color:rgba(244,138,153,.65);background:linear-gradient(180deg,rgba(244,138,153,.11),rgba(255,255,255,.025))}
.action-summary-card[data-status=running],.action-summary-card[data-status=pending]{border-color:rgba(138,180,248,.55)}
.action-summary-card[data-action-filter-hidden="true"]{display:none}
.action-summary-head{display:flex;gap:.5rem;align-items:center;justify-content:space-between;flex-wrap:wrap}
.action-summary-title{font-weight:850;letter-spacing:.01em}
.action-summary-status{border:1px solid var(--line);border-radius:999px;padding:.08rem .45rem;font:11px var(--mono);color:var(--muted)}
.action-summary-status[data-status=ok]{color:var(--ok);border-color:rgba(143,209,143,.5)}
.action-summary-status[data-status=error]{color:var(--bad);border-color:rgba(244,138,153,.65)}
.action-summary-target{font:12px var(--mono);color:#ddd;overflow-wrap:anywhere}
.action-summary-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:.4rem}
.action-summary-fact{border:1px solid rgba(255,255,255,.10);border-radius:11px;background:#0b0b0f;padding:.45rem;min-width:0}
.action-summary-fact span{display:block;color:var(--muted);font-size:.72rem;text-transform:uppercase;letter-spacing:.06em}
.action-summary-fact b{display:block;margin-top:.15rem;overflow-wrap:anywhere}
.action-summary-actions,.action-digest-actions,.action-digest-filters{display:flex;gap:.35rem;flex-wrap:wrap}
.action-digest-card{border:1px solid rgba(138,180,248,.34);border-radius:16px;background:linear-gradient(180deg,rgba(138,180,248,.10),rgba(255,255,255,.025));padding:.7rem;margin:.55rem 0;display:grid;gap:.45rem}
.action-digest-card[data-worst=error]{border-color:rgba(244,138,153,.65)}
.action-digest-title{font-weight:900;letter-spacing:.01em}
.action-digest-counts{display:flex;gap:.35rem;flex-wrap:wrap}
.action-digest-count{border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:.12rem .45rem;font:12px var(--mono);color:#ddd}
.action-digest-count[data-count="0"]{display:none}
.action-digest-filter{border:1px solid rgba(255,255,255,.14);border-radius:999px;background:#101018;color:#ddd;padding:.18rem .5rem;font:12px var(--mono);cursor:pointer}
.action-digest-filter[aria-pressed="true"]{border-color:rgba(138,180,248,.72);background:rgba(138,180,248,.16)}
.action-digest-visible-count{font:12px var(--mono);color:var(--muted)}
.action-digest-empty{color:var(--muted);font-size:.88rem}
.action-digest-list{display:grid;gap:.2rem;margin:0;padding-left:1.1rem;color:#ddd}
body.proof-final .action-summary-actions,body.proof-final .action-digest-actions{display:none}
body.proof-final .action-summary-card,body.proof-final .action-digest-card{margin:.35rem 0}
@media(max-width:760px){.action-summary-grid{grid-template-columns:1fr}.action-summary-head{align-items:flex-start}}
</style>
<script>
(function(){
  const PROOF='human-action-summary action-outcome-visible action-target-visible action-next-step-visible readable-tool-summary tool-name-not-primary tool-json-collapsed action-digest-summary action-count-summary-visible action-digest-ok-count action-digest-error-count action-digest-running-count action-digest-pending-count copy-action-digest action-digest-filter action-digest-filter-all action-digest-filter-ok action-digest-filter-error action-digest-filter-running action-digest-filter-pending action-digest-visible-count aria-pressed';
  const LABELS={repo_info:'Inspected the repository',file_list:'Listed files',file_glob:'Found matching files',file_search:'Searched files',file_read:'Read file',file_write:'Write file',file_edit:'Edit file',file_delete:'Delete file',apply_patch:'Apply patch',propose_patch:'Prepare patch',shell_command:'Run command',terminal_run:'Run command',task:'Delegate subtask',todo_write:'Update plan',batch_parallel:'Run tools in parallel',web_fetch:'Fetch web page',web_search:'Search the web',browser_proof:'Capture browser proof',vision_review:'Review screenshot',graph_build:'Build code graph',graph_query:'Query code graph'};
  function text(el){return (el&&el.textContent||'').replace(/\s+/g,' ').trim()}
  function copy(value){if(!value)return;if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(value).catch(()=>{});return}const ta=document.createElement('textarea');ta.value=value;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove()}
  function btn(label,valueFn){const b=document.createElement('button');b.type='button';b.className='mini-btn';b.textContent=label;b.addEventListener('click',e=>{e.stopPropagation();copy(valueFn())});return b}
  function safeJson(raw){try{return JSON.parse(raw)}catch{return null}}
  function parse(tool){const raw=text(tool.querySelector('.technical-details'))||text(tool.querySelector('.tool-raw'))||'';const first=raw.indexOf('{');const last=raw.lastIndexOf('}');return first>=0&&last>first?safeJson(raw.slice(first,last+1)):null}
  function addProof(el){if(!el)return;const have=new Set(String(el.getAttribute('data-proof')||'').split(/\s+/).filter(Boolean));for(const token of PROOF.split(' '))have.add(token);el.setAttribute('data-proof',[...have].join(' '))}
  function kind(tool,parsed){const name=String(tool.dataset.toolName||text(tool.querySelector('.tool-title'))||parsed?.state?.kind||parsed?.kind||'tool').toLowerCase();return Object.keys(LABELS).find(k=>name.includes(k))||name.replace(/\s+/g,'_')}
  function status(tool,parsed){const badge=text(tool.querySelector('.badge')).toLowerCase();const s=String(parsed?.state?.status||parsed?.status||'').toLowerCase();if(/error|fail|denied|needs/.test(badge)||s==='error')return'error';if(/running|working|started/.test(badge)||s==='running')return'running';if(/pending|queued/.test(badge)||s==='pending')return'pending';return'ok'}
  function target(tool,parsed){const input=parsed?.state?.input||parsed?.input||{};const meta=parsed?.state?.metadata||parsed?.metadata||{};const files=[...tool.querySelectorAll('.file-pill')].map(text).filter(Boolean);return files[0]||input.filePath||input.path||input.pattern||input.command||input.description||meta.filepath||meta.path||text(tool.querySelector('.typed-tool-target'))||text(tool.querySelector('.tool-sub'))||'No target shown'}
  function resultText(tool,parsed){return text(tool.querySelector('.tool-result'))||String(parsed?.state?.output||parsed?.output||'').slice(0,300)||'No visible result text yet'}
  function nextStep(k,st){if(st==='error')return'Review the visible error and retry after fixing input or permissions';if(k.includes('write')||k.includes('edit')||k.includes('patch'))return'Review changed files and diff before accepting the final answer';if(k.includes('shell')||k.includes('terminal')||k.includes('command'))return'Check command output and exit status';if(k.includes('todo'))return'Continue from the active plan item';if(k.includes('task'))return'Read subtask result before the next action';return'Use this evidence in the final answer'}
  function enhance(tool,index){if(!tool||tool.dataset.actionSummaryEnhanced==='true')return;tool.dataset.actionSummaryEnhanced='true';const parsed=parse(tool)||{};const k=kind(tool,parsed);const st=status(tool,parsed);const t=target(tool,parsed);const r=resultText(tool,parsed);const label=LABELS[k]||String(k||'Tool').replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());const card=document.createElement('section');card.className='action-summary-card';card.dataset.component='human-action-summary';card.dataset.proof=PROOF;card.dataset.status=st;card.dataset.actionKind=k;card.dataset.actionLabel=label;card.dataset.actionTarget=t;card.dataset.actionIndex=String(index||0);card.innerHTML='<div class="action-summary-head"><div class="action-summary-title"></div><span class="action-summary-status"></span></div><div class="action-summary-target"></div><div class="action-summary-grid"><div class="action-summary-fact"><span>Outcome</span><b></b></div><div class="action-summary-fact"><span>Target</span><b></b></div><div class="action-summary-fact"><span>Next step</span><b></b></div></div><div class="action-summary-actions"></div>';card.querySelector('.action-summary-title').textContent=label;const badge=card.querySelector('.action-summary-status');badge.textContent=st;badge.dataset.status=st;card.querySelector('.action-summary-target').textContent=t;const facts=card.querySelectorAll('.action-summary-fact b');facts[0].textContent=st==='ok'?'Completed':st==='error'?'Needs attention':st==='running'?'Running':'Pending';facts[1].textContent=t;facts[2].textContent=nextStep(k,st);const actions=card.querySelector('.action-summary-actions');actions.appendChild(btn('copy action',()=>`${label}\nTarget: ${t}\nOutcome: ${facts[0].textContent}\nNext: ${facts[2].textContent}`));actions.appendChild(btn('copy result',()=>r));const anchor=tool.querySelector('.typed-tool-summary')||tool.querySelector('.tool-lifecycle-strip')||tool.querySelector('.tool-trigger')||tool.firstElementChild;if(anchor&&anchor.parentElement){anchor.parentElement.insertBefore(card,anchor)}else{tool.prepend(card)}addProof(tool);addProof(document.body)}
  function scopeFor(tool){return tool.closest('[data-component="session-turn"],.session-turn,.message,.assistant-message,.turn')||document.body}
  function filteredCards(scope,filter){const cards=[...scope.querySelectorAll('.action-summary-card')];return filter==='all'?cards:cards.filter(card=>(card.dataset.status||'ok')===filter)}
  function digestText(cards,counts,filter){const visible=filter==='all'?cards:cards.filter(card=>(card.dataset.status||'ok')===filter);const lines=[`Action digest: ${visible.length}/${cards.length} visible tool action${cards.length===1?'':'s'} (${filter})`,`Completed: ${counts.ok}  Needs attention: ${counts.error}  Running: ${counts.running}  Pending: ${counts.pending}`];visible.slice(0,6).forEach((card,i)=>lines.push(`${i+1}. ${card.dataset.actionLabel||'Tool'} — ${card.dataset.actionTarget||'No target shown'} — ${card.dataset.status||'ok'}`));if(visible.length>6)lines.push(`+ ${visible.length-6} more visible action${visible.length-6===1?'':'s'}`);return lines.join('\n')}
  function setFilter(scope,digest,filter){digest.dataset.actionFilter=filter;const visible=filteredCards(scope,filter);scope.querySelectorAll('.action-summary-card').forEach(card=>{card.dataset.actionFilterHidden=filter!=='all'&&(card.dataset.status||'ok')!==filter?'true':'false'});digest.querySelectorAll('.action-digest-filter').forEach(button=>{button.setAttribute('aria-pressed',button.dataset.filter===filter?'true':'false')});const count=digest.querySelector('.action-digest-visible-count');if(count)count.textContent=`showing ${visible.length}/${scope.querySelectorAll('.action-summary-card').length} actions`;return visible}
  function updateDigest(scope){const cards=[...scope.querySelectorAll('.action-summary-card')];if(!cards.length)return;const counts={ok:0,error:0,running:0,pending:0};for(const card of cards){const st=card.dataset.status||'ok';counts[st]=(counts[st]||0)+1}const worst=counts.error?'error':counts.running?'running':counts.pending?'pending':'ok';let digest=scope.querySelector(':scope > .action-digest-card')||scope.querySelector('.action-digest-card[data-owned-by="action-summaries"]');if(!digest){digest=document.createElement('section');digest.className='action-digest-card';digest.dataset.component='action-digest-summary';digest.dataset.ownedBy='action-summaries';digest.dataset.proof=PROOF;digest.dataset.actionFilter='all';digest.innerHTML='<div class="action-summary-head"><div class="action-digest-title">Action digest</div><span class="action-summary-status"></span></div><div class="action-digest-counts"></div><div class="action-digest-filters" role="toolbar" aria-label="filter action digest"><button type="button" class="action-digest-filter" data-filter="all" data-proof="action-digest-filter-all aria-pressed" aria-pressed="true">all</button><button type="button" class="action-digest-filter" data-filter="ok" data-proof="action-digest-filter-ok aria-pressed" aria-pressed="false">completed</button><button type="button" class="action-digest-filter" data-filter="error" data-proof="action-digest-filter-error aria-pressed" aria-pressed="false">needs attention</button><button type="button" class="action-digest-filter" data-filter="running" data-proof="action-digest-filter-running aria-pressed" aria-pressed="false">running</button><button type="button" class="action-digest-filter" data-filter="pending" data-proof="action-digest-filter-pending aria-pressed" aria-pressed="false">pending</button></div><div class="action-digest-visible-count" data-proof="action-digest-visible-count"></div><ol class="action-digest-list"></ol><div class="action-digest-empty">No visible tool action summaries yet.</div><div class="action-digest-actions"></div>';digest.querySelectorAll('.action-digest-filter').forEach(button=>button.addEventListener('click',e=>{e.stopPropagation();setFilter(scope,digest,button.dataset.filter||'all')}));const firstTool=scope.querySelector('.tool');if(firstTool&&firstTool.parentElement){firstTool.parentElement.insertBefore(digest,firstTool)}else{scope.prepend(digest)}}digest.dataset.worst=worst;digest.dataset.actionCount=String(cards.length);digest.querySelector('.action-summary-status').textContent=worst==='ok'?'all completed':worst==='error'?'needs attention':worst;digest.querySelector('.action-summary-status').dataset.status=worst;const countBox=digest.querySelector('.action-digest-counts');countBox.innerHTML='';[['ok','completed'],['error','need attention'],['running','running'],['pending','pending']].forEach(([key,label])=>{const chip=document.createElement('span');chip.className='action-digest-count';chip.dataset.kind=key;chip.dataset.count=String(counts[key]||0);chip.textContent=`${counts[key]||0} ${label}`;countBox.appendChild(chip)});const filter=digest.dataset.actionFilter||'all';const visible=setFilter(scope,digest,filter);const list=digest.querySelector('.action-digest-list');list.innerHTML='';visible.slice(0,6).forEach(card=>{const li=document.createElement('li');li.textContent=`${card.dataset.actionLabel||'Tool'} · ${card.dataset.actionTarget||'No target shown'} · ${card.dataset.status||'ok'}`;list.appendChild(li)});digest.querySelector('.action-digest-empty').style.display=visible.length?'none':'';const actions=digest.querySelector('.action-digest-actions');if(!actions.childElementCount)actions.appendChild(btn('copy action digest',()=>digestText(cards,counts,digest.dataset.actionFilter||'all')));addProof(digest);addProof(document.body)}
  function updateDigests(){const scopes=new Set([...document.querySelectorAll('.tool')].map(scopeFor));scopes.forEach(updateDigest)}
  function run(){document.querySelectorAll('.tool').forEach(enhance);updateDigests()}
  const observer=new MutationObserver(run);observer.observe(document.documentElement,{childList:true,subtree:true,characterData:true});if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',run,{once:true});else run();
})();
</script>
