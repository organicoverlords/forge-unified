<style>
.backend-session-control-status{margin-top:.45rem;color:var(--muted);font-size:.78rem}.backend-session-controls{display:flex;gap:.35rem;flex-wrap:wrap;margin-top:.45rem}
</style>
<script>
(function(){
  const PROOF='backend-session-controls backend-checkpoint-action backend-fork-action backend-revert-action backend-retry-source-action backend-session-control-status';
  function addProof(el){if(!el)return;const cur=el.getAttribute('data-proof')||'';for(const token of PROOF.split(' ')){if(!cur.includes(token))el.setAttribute('data-proof',(el.getAttribute('data-proof')||'')+' '+token)}}
  function currentId(){try{if(typeof s!=='undefined'&&s.id)return s.id}catch{}return new URLSearchParams(location.search).get('conversation')||''}
  function note(text){if(typeof toast==='function')toast(text);document.querySelectorAll('.backend-session-control-status').forEach(el=>{el.textContent=text})}
  async function post(path,body={}){const r=await fetch(path,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(body)});const txt=await r.text();let json={};try{json=txt?JSON.parse(txt):{}}catch{json={raw:txt}}if(!r.ok)throw new Error(txt||r.statusText);return json}
  function btn(label,proof,fn){const b=document.createElement('button');b.type='button';b.className='mini-btn';b.dataset.proof=proof;b.textContent=label;b.onclick=e=>{e.stopPropagation();fn().catch(err=>note(err.message||String(err)))};return b}
  function controls(){const id=currentId();const wrap=document.createElement('div');wrap.className='backend-session-controls';wrap.dataset.proof='backend-session-controls';wrap.appendChild(btn('checkpoint','backend-checkpoint-action',async()=>{if(!id)throw new Error('No conversation selected');const r=await post(`/api/conversations/${encodeURIComponent(id)}/checkpoint`);note(r.checkpoint_saved?'checkpoint saved':'checkpoint response recorded')}));wrap.appendChild(btn('fork conversation','backend-fork-action',async()=>{if(!id)throw new Error('No conversation selected');const r=await post(`/api/conversations/${encodeURIComponent(id)}/fork`,{title:'forked browser session'});if(r.id){note('fork created');location.href=`/?conversation=${encodeURIComponent(r.id)}`}}));wrap.appendChild(btn('revert latest turn','backend-revert-action',async()=>{if(!id)throw new Error('No conversation selected');const r=await post(`/api/conversations/${encodeURIComponent(id)}/revert-last-turn`);note(r.reverted?'latest turn reverted':'revert response recorded');if(typeof pick==='function')await pick(id)}));wrap.appendChild(btn('retry from backend','backend-retry-source-action',async()=>{if(!id)throw new Error('No conversation selected');const r=await post(`/api/conversations/${encodeURIComponent(id)}/retry-source`);const input=document.getElementById('input');if(input&&r.message){input.value=r.message;note('retry source loaded from backend');if(typeof send==='function')await send()}}));return wrap}
  function enhance(){addProof(document.body);const head=document.querySelector('.session-head');if(head&&!head.querySelector('.backend-session-controls')){head.appendChild(controls());const status=document.createElement('div');status.className='backend-session-control-status';status.dataset.proof='backend-session-control-status';status.textContent='Backend session controls: checkpoint, fork, revert latest turn, and retry source.';head.appendChild(status)}document.querySelectorAll('.turn-receipt-toolbar').forEach(toolbar=>{if(toolbar.querySelector('[data-proof="backend-checkpoint-action"]'))return;toolbar.appendChild(btn('checkpoint','backend-checkpoint-action',async()=>{const id=currentId();if(!id)throw new Error('No conversation selected');const r=await post(`/api/conversations/${encodeURIComponent(id)}/checkpoint`);note(r.checkpoint_saved?'checkpoint saved':'checkpoint response recorded')}));toolbar.appendChild(btn('fork','backend-fork-action',async()=>{const id=currentId();if(!id)throw new Error('No conversation selected');const r=await post(`/api/conversations/${encodeURIComponent(id)}/fork`,{title:'forked turn'});if(r.id){note('fork created');location.href=`/?conversation=${encodeURIComponent(r.id)}`}}))})}
  const observer=new MutationObserver(()=>enhance());observer.observe(document.documentElement,{childList:true,subtree:true});if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',enhance,{once:true});else enhance();
})();
</script>
