<style>
.backend-session-control-status{margin-top:.45rem;color:var(--muted);font-size:.78rem}
.backend-session-controls{display:flex;gap:.35rem;flex-wrap:wrap;margin-top:.45rem}
.backend-session-control-receipt{margin-top:.35rem;padding:.35rem .45rem;border:1px solid var(--border);border-radius:.5rem;color:var(--muted);font-size:.72rem;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.backend-session-control-receipt[data-state="error"]{color:var(--danger,#ff8a8a)}
.backend-session-control-ledger{margin-top:.35rem;display:grid;gap:.25rem;font-size:.72rem;color:var(--muted)}
.backend-session-control-event-row{display:flex;align-items:center;justify-content:space-between;gap:.45rem;padding:.3rem .45rem;border:1px solid var(--border);border-radius:.45rem;background:color-mix(in srgb,var(--surface,#111) 92%,transparent)}
.backend-session-control-event-main{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.backend-session-control-event-row[data-status="error"]{color:var(--danger,#ff8a8a)}
</style>
<script>
(function(){
  const PROOF='backend-session-controls backend-checkpoint-action backend-fork-action backend-revert-action backend-retry-source-action backend-session-control-status backend-session-control-receipt copy-session-control-receipt session-control-event-ledger forge-local-control-receipt backend-session-control-ledger backend-session-control-event-row copy-session-control-event data-session-control-event';
  let lastReceipt=null;
  const ledger=[];
  function addProof(el){if(!el)return;const cur=el.getAttribute('data-proof')||'';for(const token of PROOF.split(' ')){if(!cur.includes(token))el.setAttribute('data-proof',(el.getAttribute('data-proof')||'')+' '+token)}}
  function currentId(){try{if(typeof s!=='undefined'&&s.id)return s.id}catch{}return new URLSearchParams(location.search).get('conversation')||''}
  function receiptText(value){try{return JSON.stringify(value)}catch{return String(value)}}
  function receiptSummary(value){const action=value&&value.action?value.action:'session_control';const status=value&&value.status?value.status:'recorded';const at=value&&value.created_at?value.created_at:new Date().toISOString();return `${action} · ${status} · ${at}`}
  function setBusy(button,busy){if(!button)return;button.disabled=!!busy;button.dataset.state=busy?'running':'idle';button.setAttribute('aria-busy',busy?'true':'false')}
  function renderLedger(){document.querySelectorAll('.backend-session-control-ledger').forEach(list=>{list.textContent='';const items=ledger.slice(0,4);if(!items.length){const empty=document.createElement('div');empty.className='backend-session-control-event-row';empty.dataset.proof='session-control-event-ledger backend-session-control-event-row';empty.dataset.status='idle';empty.textContent='Session control event ledger is empty.';list.appendChild(empty);return}for(const value of items){const row=document.createElement('div');row.className='backend-session-control-event-row';row.dataset.proof='session-control-event-ledger backend-session-control-event-row copy-session-control-event data-session-control-event';row.dataset.status=(value&&value.status)||'recorded';row.setAttribute('data-session-control-event',receiptText(value));const main=document.createElement('span');main.className='backend-session-control-event-main';main.textContent=receiptSummary(value);const copy=document.createElement('button');copy.type='button';copy.className='mini-btn';copy.textContent='copy event';copy.dataset.proof='copy-session-control-event';copy.onclick=async e=>{e.stopPropagation();await navigator.clipboard?.writeText?.(receiptText(value));note('session control event copied')};row.appendChild(main);row.appendChild(copy);list.appendChild(row)}})}
  function showReceipt(value,state='ok'){lastReceipt=value;ledger.unshift(value);ledger.splice(8);const text=receiptText(value);document.querySelectorAll('.backend-session-control-receipt').forEach(el=>{el.dataset.state=state;el.setAttribute('data-session-control-event',text);el.textContent=text});renderLedger();document.dispatchEvent(new CustomEvent('forge:session-control',{bubbles:true,detail:value}))}
  function note(text){if(typeof toast==='function')toast(text);document.querySelectorAll('.backend-session-control-status').forEach(el=>{el.textContent=text})}
  async function post(path,body={}){const r=await fetch(path,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(body)});const txt=await r.text();let json={};try{json=txt?JSON.parse(txt):{}}catch{json={raw:txt}}if(!r.ok)throw new Error(txt||r.statusText);return json}
  function btn(label,proof,fn){const b=document.createElement('button');b.type='button';b.className='mini-btn';b.dataset.proof=proof;b.textContent=label;b.onclick=async e=>{e.stopPropagation();setBusy(b,true);try{const r=await fn();if(r&&r.receipt)showReceipt(r.receipt);return r}catch(err){const payload={type:'forge.session_control',status:'error',action:label,error:err.message||String(err),created_at:new Date().toISOString()};showReceipt(payload,'error');note(payload.error)}finally{setBusy(b,false)}};return b}
  function receiptNode(){const wrap=document.createElement('div');wrap.className='backend-session-control-receipt';wrap.dataset.proof='backend-session-control-receipt session-control-event-ledger forge-local-control-receipt data-session-control-event';wrap.dataset.state='idle';wrap.textContent='Session control receipt will appear here.';return wrap}
  function ledgerNode(){const wrap=document.createElement('div');wrap.className='backend-session-control-ledger';wrap.dataset.proof='backend-session-control-ledger session-control-event-ledger backend-session-control-event-row copy-session-control-event data-session-control-event';return wrap}
  function copyButton(){return btn('copy session receipt','copy-session-control-receipt',async()=>{const value=lastReceipt||{type:'forge.session_control',status:'empty',created_at:new Date().toISOString()};await navigator.clipboard?.writeText?.(receiptText(value));note('session control receipt copied');return {receipt:value}})}
  function controls(){const id=currentId();const wrap=document.createElement('div');wrap.className='backend-session-controls';wrap.dataset.proof='backend-session-controls';wrap.appendChild(btn('checkpoint','backend-checkpoint-action',async()=>{if(!id)throw new Error('No conversation selected');const r=await post(`/api/conversations/${encodeURIComponent(id)}/checkpoint`);note(r.checkpoint_saved?'checkpoint saved':'checkpoint response recorded');return r}));wrap.appendChild(btn('fork conversation','backend-fork-action',async()=>{if(!id)throw new Error('No conversation selected');const r=await post(`/api/conversations/${encodeURIComponent(id)}/fork`,{title:'forked browser session'});note(r.id?'fork created':'fork response recorded');setTimeout(()=>{if(r.id)location.href=`/?conversation=${encodeURIComponent(r.id)}`},120);return r}));wrap.appendChild(btn('revert latest turn','backend-revert-action',async()=>{if(!id)throw new Error('No conversation selected');const r=await post(`/api/conversations/${encodeURIComponent(id)}/revert-last-turn`);note(r.reverted?'latest turn reverted':'revert response recorded');if(typeof pick==='function')await pick(id);return r}));wrap.appendChild(btn('retry from backend','backend-retry-source-action',async()=>{if(!id)throw new Error('No conversation selected');const r=await post(`/api/conversations/${encodeURIComponent(id)}/retry-source`);const input=document.getElementById('input');if(input&&r.message){input.value=r.message;note('retry source loaded from backend');if(typeof send==='function')await send()}return r}));wrap.appendChild(copyButton());return wrap}
  function enhance(){addProof(document.body);const head=document.querySelector('.session-head');if(head&&!head.querySelector('.backend-session-controls')){head.appendChild(controls());const status=document.createElement('div');status.className='backend-session-control-status';status.dataset.proof='backend-session-control-status';status.textContent='Backend session controls: checkpoint, fork, revert latest turn, and retry source.';head.appendChild(status);head.appendChild(receiptNode());head.appendChild(ledgerNode());renderLedger()}document.querySelectorAll('.turn-receipt-toolbar').forEach(toolbar=>{if(toolbar.querySelector('[data-proof="backend-checkpoint-action"]'))return;toolbar.appendChild(btn('checkpoint','backend-checkpoint-action',async()=>{const id=currentId();if(!id)throw new Error('No conversation selected');const r=await post(`/api/conversations/${encodeURIComponent(id)}/checkpoint`);note(r.checkpoint_saved?'checkpoint saved':'checkpoint response recorded');return r}));toolbar.appendChild(btn('fork','backend-fork-action',async()=>{const id=currentId();if(!id)throw new Error('No conversation selected');const r=await post(`/api/conversations/${encodeURIComponent(id)}/fork`,{title:'forked turn'});note(r.id?'fork created':'fork response recorded');setTimeout(()=>{if(r.id)location.href=`/?conversation=${encodeURIComponent(r.id)}`},120);return r}));toolbar.appendChild(copyButton())})}
  const observer=new MutationObserver(()=>enhance());observer.observe(document.documentElement,{childList:true,subtree:true});if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',enhance,{once:true});else enhance();
})();
</script>
