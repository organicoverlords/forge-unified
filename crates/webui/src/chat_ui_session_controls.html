<style>
.backend-session-control-status{margin-top:.45rem;color:var(--muted);font-size:.78rem}
.backend-session-controls{display:flex;gap:.35rem;flex-wrap:wrap;margin-top:.45rem}
.backend-session-control-receipt{margin-top:.35rem;padding:.35rem .45rem;border:1px solid var(--border);border-radius:.5rem;color:var(--muted);font-size:.72rem;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.backend-session-control-receipt[data-state="error"]{color:var(--danger,#ff8a8a)}
.backend-session-control-summary{margin-top:.35rem;display:flex;gap:.35rem;flex-wrap:wrap;align-items:center;color:var(--muted);font-size:.72rem}
.backend-session-control-count{padding:.18rem .4rem;border:1px solid var(--border);border-radius:999px;background:color-mix(in srgb,var(--surface,#111) 88%,transparent)}
.backend-session-control-filter{padding:.18rem .4rem;border:1px solid var(--border);border-radius:999px}
.backend-session-control-filter[aria-pressed="true"]{color:var(--text);background:color-mix(in srgb,var(--accent,#7aa2ff) 18%,transparent)}
.backend-session-control-overflow-toggle{padding:.18rem .4rem;border:1px solid var(--border);border-radius:999px}
.backend-session-control-ledger{margin-top:.35rem;display:grid;gap:.25rem;font-size:.72rem;color:var(--muted)}
.backend-session-control-event-row{display:grid;grid-template-columns:minmax(0,1fr) auto auto;align-items:center;gap:.45rem;padding:.3rem .45rem;border:1px solid var(--border);border-radius:.45rem;background:color-mix(in srgb,var(--surface,#111) 92%,transparent)}
.backend-session-control-event-main{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.backend-session-control-event-row[data-status="error"]{color:var(--danger,#ff8a8a)}
.backend-session-control-event-detail{grid-column:1/-1;margin-top:.2rem;padding:.35rem .45rem;border:1px solid var(--border);border-radius:.45rem;white-space:pre-wrap;overflow:auto;max-height:10rem;color:var(--text);background:color-mix(in srgb,var(--surface,#111) 82%,transparent)}
.backend-session-control-event-row[data-expanded="false"] .backend-session-control-event-detail{display:none}
.backend-session-control-diff-summary,.backend-session-control-duration-summary{grid-column:1/-1;display:flex;gap:.35rem;flex-wrap:wrap;align-items:center;margin-top:.2rem}
.backend-session-control-diff-chip,.backend-session-control-duration-chip{padding:.15rem .38rem;border:1px solid var(--border);border-radius:999px;color:var(--muted)}
.backend-session-control-diff-chip[data-kind="removed"]{color:var(--danger,#ff8a8a)}
</style>
<script>
(function(){
  const PROOF='backend-session-controls backend-checkpoint-action backend-fork-action backend-revert-action backend-retry-source-action backend-session-control-status backend-session-control-receipt copy-session-control-receipt session-control-event-ledger forge-local-control-receipt backend-session-control-ledger backend-session-control-event-row copy-session-control-event data-session-control-event session-control-event-disclosure backend-session-control-event-detail show-session-control-event aria-expanded aria-controls session-control-count-summary backend-session-control-summary backend-session-control-count session-control-filter session-control-filter-all session-control-filter-ok session-control-filter-error aria-pressed session-control-diff-summary backend-session-control-diff-summary backend-session-control-diff-chip session-control-diff-before session-control-diff-after session-control-diff-removed session-control-duration-summary backend-session-control-duration-summary backend-session-control-duration-chip session-control-duration-ms session-control-started-at session-control-completed-at session-control-ledger-overflow backend-session-control-overflow-toggle session-control-show-all session-control-show-less session-control-visible-count';
  let lastReceipt=null;
  let ledgerFilter='all';
  let ledgerExpanded=false;
  const ledger=[];
  function addProof(el){if(!el)return;const cur=el.getAttribute('data-proof')||'';for(const token of PROOF.split(' ')){if(!cur.includes(token))el.setAttribute('data-proof',(el.getAttribute('data-proof')||'')+' '+token)}}
  function currentId(){try{if(typeof s!=='undefined'&&s.id)return s.id}catch{}return new URLSearchParams(location.search).get('conversation')||''}
  function receiptText(value){try{return JSON.stringify(value,null,2)}catch{return String(value)}}
  function payloadOf(value){return value&&value.payload&&typeof value.payload==='object'?value.payload:{}}
  function receiptSummary(value){const action=value&&value.action?value.action:'session_control';const status=value&&value.status?value.status:'recorded';const at=value&&value.created_at?value.created_at:new Date().toISOString();return `${action} · ${status} · ${at}`}
  function receiptStatus(value){return value&&value.status==='error'?'error':'ok'}
  function diffSummary(value){const p=payloadOf(value);const before=Number.isFinite(+p.before)?+p.before:null;const after=Number.isFinite(+p.after)?+p.after:null;const removed=Number.isFinite(+p.removed_messages)?+p.removed_messages:null;if(before===null&&after===null&&removed===null)return null;return {before,after,removed}}
  function diffNode(value){const diff=diffSummary(value);if(!diff)return null;const wrap=document.createElement('div');wrap.className='backend-session-control-diff-summary';wrap.dataset.proof='session-control-diff-summary backend-session-control-diff-summary backend-session-control-diff-chip session-control-diff-before session-control-diff-after session-control-diff-removed';const chips=[['before',diff.before,'session-control-diff-before'],['after',diff.after,'session-control-diff-after'],['removed',diff.removed,'session-control-diff-removed']];for(const [label,count,proof] of chips){if(count===null)continue;const chip=document.createElement('span');chip.className='backend-session-control-diff-chip';chip.dataset.kind=label;chip.dataset.proof=`backend-session-control-diff-chip ${proof}`;chip.textContent=`${label}: ${count}`;wrap.appendChild(chip)}return wrap}
  function timingOf(value){return value&&value.ui_timing&&typeof value.ui_timing==='object'?value.ui_timing:{}}
  function withTiming(value,timing){if(value&&typeof value==='object'&&!Array.isArray(value))return {...value,ui_timing:timing};return {type:'forge.session_control',status:'recorded',value,ui_timing:timing,created_at:new Date().toISOString()}}
  function durationNode(value){const timing=timingOf(value);const duration=Number.isFinite(+timing.duration_ms)?Math.max(0,Math.round(+timing.duration_ms)):null;const started=typeof timing.started_at==='string'?timing.started_at:'';const completed=typeof timing.completed_at==='string'?timing.completed_at:'';if(duration===null&&!started&&!completed)return null;const wrap=document.createElement('div');wrap.className='backend-session-control-duration-summary';wrap.dataset.proof='session-control-duration-summary backend-session-control-duration-summary backend-session-control-duration-chip session-control-duration-ms session-control-started-at session-control-completed-at';const chips=[['duration',duration===null?null:`${duration}ms`,'session-control-duration-ms'],['started',started,'session-control-started-at'],['completed',completed,'session-control-completed-at']];for(const [label,value,proof] of chips){if(value===null||value==='')continue;const chip=document.createElement('span');chip.className='backend-session-control-duration-chip';chip.dataset.proof=`backend-session-control-duration-chip ${proof}`;chip.textContent=`${label}: ${value}`;wrap.appendChild(chip)}return wrap}
  function filteredLedger(){return ledger.filter(value=>ledgerFilter==='all'||receiptStatus(value)===ledgerFilter)}
  function setBusy(button,busy){if(!button)return;button.disabled=!!busy;button.dataset.state=busy?'running':'idle';button.setAttribute('aria-busy',busy?'true':'false')}
  function renderSummary(){document.querySelectorAll('.backend-session-control-summary').forEach(wrap=>{wrap.textContent='';const ok=ledger.filter(x=>receiptStatus(x)==='ok').length;const error=ledger.filter(x=>receiptStatus(x)==='error').length;const total=ledger.length;const filtered=filteredLedger();const visible=ledgerExpanded?filtered.length:Math.min(4,filtered.length);const overflow=Math.max(0,filtered.length-visible);const counts=document.createElement('span');counts.className='backend-session-control-count';counts.dataset.proof='session-control-count-summary backend-session-control-count session-control-visible-count';counts.textContent=`${total} events · ${ok} ok · ${error} error · showing ${visible}/${filtered.length}`;wrap.appendChild(counts);for(const item of [['all','all'],['ok','ok'],['error','error']]){const b=document.createElement('button');b.type='button';b.className='mini-btn backend-session-control-filter';b.dataset.proof=`session-control-filter session-control-filter-${item[0]} aria-pressed`;b.textContent=item[1];b.setAttribute('aria-pressed',ledgerFilter===item[0]?'true':'false');b.onclick=e=>{e.stopPropagation();ledgerFilter=item[0];ledgerExpanded=false;renderLedger()};wrap.appendChild(b)}if(filtered.length>4){const more=document.createElement('button');more.type='button';more.className='mini-btn backend-session-control-overflow-toggle';more.dataset.proof=`session-control-ledger-overflow backend-session-control-overflow-toggle ${ledgerExpanded?'session-control-show-less':'session-control-show-all'} aria-expanded session-control-visible-count`;more.textContent=ledgerExpanded?'show less':`show ${overflow} older`;more.setAttribute('aria-expanded',ledgerExpanded?'true':'false');more.onclick=e=>{e.stopPropagation();ledgerExpanded=!ledgerExpanded;renderLedger()};wrap.appendChild(more)}})}
  function renderLedger(){renderSummary();document.querySelectorAll('.backend-session-control-ledger').forEach(list=>{list.textContent='';const filtered=filteredLedger();const items=ledgerExpanded?filtered:filtered.slice(0,4);if(!items.length){const empty=document.createElement('div');empty.className='backend-session-control-event-row';empty.dataset.proof='session-control-event-ledger backend-session-control-event-row session-control-event-disclosure session-control-count-summary session-control-filter session-control-diff-summary session-control-duration-summary session-control-ledger-overflow session-control-visible-count';empty.dataset.status='idle';empty.dataset.expanded='false';empty.textContent=ledger.length?'No session control events match this filter.':'Session control event ledger is empty.';list.appendChild(empty);return}items.forEach((value,index)=>{const row=document.createElement('div');const id=`session-control-event-${index}-${Date.now()}`;row.className='backend-session-control-event-row';row.dataset.proof='session-control-event-ledger backend-session-control-event-row copy-session-control-event data-session-control-event session-control-event-disclosure backend-session-control-event-detail show-session-control-event aria-expanded aria-controls session-control-count-summary session-control-filter session-control-diff-summary backend-session-control-diff-summary session-control-duration-summary backend-session-control-duration-summary session-control-ledger-overflow session-control-visible-count';row.dataset.status=receiptStatus(value);row.dataset.expanded='false';row.setAttribute('data-session-control-event',receiptText(value));const main=document.createElement('span');main.className='backend-session-control-event-main';main.textContent=receiptSummary(value);const toggle=document.createElement('button');toggle.type='button';toggle.className='mini-btn';toggle.textContent='show event';toggle.dataset.proof='show-session-control-event session-control-event-disclosure aria-expanded aria-controls';toggle.setAttribute('aria-expanded','false');toggle.setAttribute('aria-controls',id);const detail=document.createElement('pre');detail.id=id;detail.className='backend-session-control-event-detail';detail.dataset.proof='backend-session-control-event-detail data-session-control-event';detail.textContent=receiptText(value);toggle.onclick=e=>{e.stopPropagation();const open=row.dataset.expanded!=='true';row.dataset.expanded=open?'true':'false';toggle.textContent=open?'hide event':'show event';toggle.setAttribute('aria-expanded',open?'true':'false')};const copy=document.createElement('button');copy.type='button';copy.className='mini-btn';copy.textContent='copy event';copy.dataset.proof='copy-session-control-event';copy.onclick=async e=>{e.stopPropagation();await navigator.clipboard?.writeText?.(receiptText(value));note('session control event copied')};row.appendChild(main);row.appendChild(toggle);row.appendChild(copy);const diff=diffNode(value);if(diff)row.appendChild(diff);const duration=durationNode(value);if(duration)row.appendChild(duration);row.appendChild(detail);list.appendChild(row)})})}
  function showReceipt(value,state='ok'){lastReceipt=value;ledger.unshift(value);ledger.splice(8);const text=receiptText(value);document.querySelectorAll('.backend-session-control-receipt').forEach(el=>{el.dataset.state=state;el.setAttribute('data-session-control-event',text);el.textContent=text});renderLedger();document.dispatchEvent(new CustomEvent('forge:session-control',{bubbles:true,detail:value}))}
  function note(text){if(typeof toast==='function')toast(text);document.querySelectorAll('.backend-session-control-status').forEach(el=>{el.textContent=text})}
  async function post(path,body={}){const r=await fetch(path,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(body)});const txt=await r.text();let json={};try{json=txt?JSON.parse(txt):{}}catch{json={raw:txt}}if(!r.ok)throw new Error(txt||r.statusText);return json}
  function btn(label,proof,fn){const b=document.createElement('button');b.type='button';b.className='mini-btn';b.dataset.proof=proof;b.textContent=label;b.onclick=async e=>{e.stopPropagation();setBusy(b,true);const started_at=new Date().toISOString();const started=(typeof performance!=='undefined'&&performance.now)?performance.now():Date.now();try{const r=await fn();const completed_at=new Date().toISOString();const duration_ms=Math.max(0,Math.round(((typeof performance!=='undefined'&&performance.now)?performance.now():Date.now())-started));const timing={started_at,completed_at,duration_ms};if(r&&r.receipt){r.receipt=withTiming(r.receipt,timing);showReceipt(r.receipt)}return r}catch(err){const completed_at=new Date().toISOString();const duration_ms=Math.max(0,Math.round(((typeof performance!=='undefined'&&performance.now)?performance.now():Date.now())-started));const payload={type:'forge.session_control',status:'error',action:label,error:err.message||String(err),ui_timing:{started_at,completed_at,duration_ms},created_at:new Date().toISOString()};showReceipt(payload,'error');note(payload.error)}finally{setBusy(b,false)}};return b}
  function receiptNode(){const wrap=document.createElement('div');wrap.className='backend-session-control-receipt';wrap.dataset.proof='backend-session-control-receipt session-control-event-ledger forge-local-control-receipt data-session-control-event session-control-duration-summary session-control-ledger-overflow';wrap.dataset.state='idle';wrap.textContent='Session control receipt will appear here.';return wrap}
  function summaryNode(){const wrap=document.createElement('div');wrap.className='backend-session-control-summary';wrap.dataset.proof='session-control-count-summary backend-session-control-summary backend-session-control-count session-control-filter session-control-filter-all session-control-filter-ok session-control-filter-error aria-pressed session-control-ledger-overflow backend-session-control-overflow-toggle session-control-show-all session-control-show-less session-control-visible-count';return wrap}
  function ledgerNode(){const wrap=document.createElement('div');wrap.className='backend-session-control-ledger';wrap.dataset.proof='backend-session-control-ledger session-control-event-ledger backend-session-control-event-row copy-session-control-event data-session-control-event session-control-event-disclosure backend-session-control-event-detail show-session-control-event aria-expanded aria-controls session-control-count-summary session-control-filter session-control-diff-summary backend-session-control-diff-summary backend-session-control-diff-chip session-control-duration-summary backend-session-control-duration-summary backend-session-control-duration-chip session-control-duration-ms session-control-started-at session-control-completed-at session-control-ledger-overflow backend-session-control-overflow-toggle session-control-show-all session-control-show-less session-control-visible-count';return wrap}
  function copyButton(){return btn('copy session receipt','copy-session-control-receipt',async()=>{const value=lastReceipt||{type:'forge.session_control',status:'empty',created_at:new Date().toISOString()};await navigator.clipboard?.writeText?.(receiptText(value));note('session control receipt copied');return {receipt:value}})}
  function controls(){const id=currentId();const wrap=document.createElement('div');wrap.className='backend-session-controls';wrap.dataset.proof='backend-session-controls';wrap.appendChild(btn('checkpoint','backend-checkpoint-action',async()=>{if(!id)throw new Error('No conversation selected');const r=await post(`/api/conversations/${encodeURIComponent(id)}/checkpoint`);note(r.checkpoint_saved?'checkpoint saved':'checkpoint response recorded');return r}));wrap.appendChild(btn('fork conversation','backend-fork-action',async()=>{if(!id)throw new Error('No conversation selected');const r=await post(`/api/conversations/${encodeURIComponent(id)}/fork`,{title:'forked browser session'});note(r.id?'fork created':'fork response recorded');setTimeout(()=>{if(r.id)location.href=`/?conversation=${encodeURIComponent(r.id)}`},120);return r}));wrap.appendChild(btn('revert latest turn','backend-revert-action',async()=>{if(!id)throw new Error('No conversation selected');const r=await post(`/api/conversations/${encodeURIComponent(id)}/revert-last-turn`);note(r.reverted?'latest turn reverted':'revert response recorded');if(typeof pick==='function')await pick(id);return r}));wrap.appendChild(btn('retry from backend','backend-retry-source-action',async()=>{if(!id)throw new Error('No conversation selected');const r=await post(`/api/conversations/${encodeURIComponent(id)}/retry-source`);const input=document.getElementById('input');if(input&&r.message){input.value=r.message;note('retry source loaded from backend');if(typeof send==='function')await send()}return r}));wrap.appendChild(copyButton());return wrap}
  function enhance(){addProof(document.body);const head=document.querySelector('.session-head');if(head&&!head.querySelector('.backend-session-controls')){head.appendChild(controls());const status=document.createElement('div');status.className='backend-session-control-status';status.dataset.proof='backend-session-control-status';status.textContent='Backend session controls: checkpoint, fork, revert latest turn, and retry source.';head.appendChild(status);head.appendChild(receiptNode());head.appendChild(summaryNode());head.appendChild(ledgerNode());renderLedger()}document.querySelectorAll('.turn-receipt-toolbar').forEach(toolbar=>{if(toolbar.querySelector('[data-proof="backend-checkpoint-action"]'))return;toolbar.appendChild(btn('checkpoint','backend-checkpoint-action',async()=>{const id=currentId();if(!id)throw new Error('No conversation selected');const r=await post(`/api/conversations/${encodeURIComponent(id)}/checkpoint`);note(r.checkpoint_saved?'checkpoint saved':'checkpoint response recorded');return r}));toolbar.appendChild(btn('fork','backend-fork-action',async()=>{const id=currentId();if(!id)throw new Error('No conversation selected');const r=await post(`/api/conversations/${encodeURIComponent(id)}/fork`,{title:'forked turn'});note(r.id?'fork created':'fork response recorded');setTimeout(()=>{if(r.id)location.href=`/?conversation=${encodeURIComponent(r.id)}`},120);return r}));toolbar.appendChild(copyButton())})}
  const observer=new MutationObserver(()=>enhance());observer.observe(document.documentElement,{childList:true,subtree:true});if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',enhance,{once:true});else enhance();
})();
</script>
