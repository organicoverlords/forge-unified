<style>
.action-summary-card[data-action-pinned="true"]{border-color:rgba(143,209,143,.72);box-shadow:0 0 0 1px rgba(143,209,143,.18)}
.action-summary-pin-state{font:12px var(--mono);color:var(--muted)}
.action-summary-pin-state[data-pinned="true"]{color:var(--ok)}
</style>
<script>
(function(){
  const PROOF='action-digest-pin-visible pinned-action-summary copy-pinned-actions action-pin-count message-action-button-parity packages/session-ui/src/components/message-part.tsx packages/session-ui/src/components/tool-count-summary.tsx';
  function addProof(el){if(!el)return;const have=new Set(String(el.getAttribute('data-proof')||'').split(/\s+/).filter(Boolean));for(const token of PROOF.split(' '))have.add(token);el.setAttribute('data-proof',[...have].join(' '))}
  function text(el){return (el&&el.textContent||'').replace(/\s+/g,' ').trim()}
  function copy(value){if(!value)return;if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(value).catch(()=>{});return}const ta=document.createElement('textarea');ta.value=value;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove()}
  function cards(scope){return [...scope.querySelectorAll('.action-summary-card')]}
  function pinned(scope){return cards(scope).filter(card=>card.dataset.actionPinned==='true')}
  function pinnedText(scope){const selected=pinned(scope);const source=selected.length?selected:cards(scope).filter(card=>card.dataset.actionFilterHidden!=='true');const lines=[`Pinned action digest: ${selected.length} pinned / ${cards(scope).length} total`];source.slice(0,8).forEach((card,i)=>lines.push(`${i+1}. ${card.dataset.actionLabel||text(card.querySelector('.action-summary-title'))||'Tool'} — ${card.dataset.actionTarget||text(card.querySelector('.action-summary-target'))||'No target shown'} — ${card.dataset.status||'ok'}`));return lines.join('\n')}
  function updateDigest(scope){const digest=scope.querySelector('.action-digest-card[data-owned-by="action-summaries"]');if(!digest)return;let state=digest.querySelector('.action-summary-pin-state');if(!state){state=document.createElement('span');state.className='action-summary-pin-state';state.dataset.proof='action-pin-count';digest.querySelector('.action-summary-head')?.appendChild(state)}const count=pinned(scope).length;state.textContent=`${count} pinned action${count===1?'':'s'}`;state.dataset.pinned=count?'true':'false';const actions=digest.querySelector('.action-digest-actions');if(actions&&!actions.querySelector('[data-action="copy-pinned-actions"]')){const b=document.createElement('button');b.type='button';b.className='mini-btn';b.textContent='copy pinned actions';b.dataset.action='copy-pinned-actions';b.dataset.proof='copy-pinned-actions';b.addEventListener('click',e=>{e.stopPropagation();copy(pinnedText(scope))});actions.appendChild(b)}addProof(digest);addProof(document.body)}
  function enhance(card){if(!card||card.dataset.actionPinEnhanced==='true')return;card.dataset.actionPinEnhanced='true';card.dataset.actionPinned=card.dataset.actionPinned||'false';const actions=card.querySelector('.action-summary-actions');if(actions&&!actions.querySelector('[data-action="pin-action-summary"]')){const b=document.createElement('button');b.type='button';b.className='mini-btn';b.textContent='pin action';b.dataset.action='pin-action-summary';b.dataset.proof='action-digest-pin-visible pinned-action-summary';b.addEventListener('click',e=>{e.stopPropagation();const next=card.dataset.actionPinned!=='true';card.dataset.actionPinned=next?'true':'false';b.textContent=next?'unpin action':'pin action';updateDigest(card.closest('[data-component="session-turn"],.session-turn,.message,.assistant-message,.turn')||document.body)});actions.appendChild(b)}addProof(card)}
  function run(){document.querySelectorAll('.action-summary-card').forEach(enhance);const scopes=new Set([...document.querySelectorAll('.action-summary-card')].map(card=>card.closest('[data-component="session-turn"],.session-turn,.message,.assistant-message,.turn')||document.body));scopes.forEach(updateDigest)}
  const observer=new MutationObserver(run);observer.observe(document.documentElement,{childList:true,subtree:true,characterData:true});if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',run,{once:true});else run();
})();
</script>
