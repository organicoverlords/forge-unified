<style>
.action-summary-card[data-action-pinned="true"]{border-color:rgba(143,209,143,.72);box-shadow:0 0 0 1px rgba(143,209,143,.18)}
.action-summary-pin-state{font:12px var(--mono);color:var(--muted)}
.action-summary-pin-state[data-pinned="true"]{color:var(--ok)}
.action-summary-pinned-rail{display:none;margin:.45rem 0;padding:.45rem;border:1px solid var(--border);border-radius:.65rem;background:rgba(143,209,143,.06)}
.action-summary-pinned-rail[data-has-pins="true"]{display:block}
.action-summary-pinned-rail-head{display:flex;gap:.4rem;align-items:center;justify-content:space-between;flex-wrap:wrap;color:var(--muted);font-size:.72rem;margin-bottom:.35rem}
.action-summary-pinned-rail-list{display:grid;gap:.3rem}
.action-summary-pinned-rail-item{padding:.35rem .45rem;border:1px solid rgba(143,209,143,.25);border-radius:.5rem;background:rgba(0,0,0,.12);font-size:.78rem}
.action-summary-pinned-rail-item strong{color:var(--text)}
.action-summary-pinned-rail-item span{color:var(--muted)}
</style>
<script>
(function(){
  const PROOF='action-digest-pin-visible pinned-action-summary copy-pinned-actions action-pin-count pinned-action-rail pinned-action-rail-list pinned-action-rail-overflow message-action-button-parity packages/session-ui/src/components/message-part.tsx packages/session-ui/src/components/session-turn.tsx packages/session-ui/src/components/tool-count-summary.tsx';
  function addProof(el){if(!el)return;const have=new Set(String(el.getAttribute('data-proof')||'').split(/\s+/).filter(Boolean));for(const token of PROOF.split(' '))have.add(token);el.setAttribute('data-proof',[...have].join(' '))}
  function text(el){return (el&&el.textContent||'').replace(/\s+/g,' ').trim()}
  function copy(value){if(!value)return;if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(value).catch(()=>{});return}const ta=document.createElement('textarea');ta.value=value;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove()}
  function cards(scope){return [...scope.querySelectorAll('.action-summary-card')]}
  function pinned(scope){return cards(scope).filter(card=>card.dataset.actionPinned==='true')}
  function rowText(card,i){return `${i+1}. ${card.dataset.actionLabel||text(card.querySelector('.action-summary-title'))||'Tool'} — ${card.dataset.actionTarget||text(card.querySelector('.action-summary-target'))||'No target shown'} — ${card.dataset.status||'ok'}`}
  function pinnedText(scope){const selected=pinned(scope);const source=selected.length?selected:cards(scope).filter(card=>card.dataset.actionFilterHidden!=='true');const lines=[`Pinned action digest: ${selected.length} pinned / ${cards(scope).length} total`];source.slice(0,8).forEach((card,i)=>lines.push(rowText(card,i)));return lines.join('\n')}
  function rail(scope,digest){let node=digest.querySelector('.action-summary-pinned-rail');if(!node){node=document.createElement('div');node.className='action-summary-pinned-rail';node.dataset.proof='pinned-action-rail pinned-action-rail-list pinned-action-rail-overflow';node.innerHTML='<div class="action-summary-pinned-rail-head"><span data-role="pinned-rail-title">pinned actions</span><button type="button" class="mini-btn" data-action="copy-pinned-rail" data-proof="copy-pinned-actions">copy pinned actions</button></div><div class="action-summary-pinned-rail-list" data-proof="pinned-action-rail-list"></div>';node.querySelector('[data-action="copy-pinned-rail"]')?.addEventListener('click',e=>{e.stopPropagation();copy(pinnedText(scope))});digest.querySelector('.action-summary-head')?.insertAdjacentElement('afterend',node)}return node}
  function renderRail(scope,digest){const selected=pinned(scope);const node=rail(scope,digest);node.dataset.hasPins=selected.length?'true':'false';node.querySelector('[data-role="pinned-rail-title"]').textContent=`pinned actions (${selected.length})`;const list=node.querySelector('.action-summary-pinned-rail-list');list.replaceChildren();selected.slice(0,4).forEach((card,i)=>{const item=document.createElement('button');item.type='button';item.className='action-summary-pinned-rail-item';item.dataset.proof='pinned-action-rail-item';item.innerHTML=`<strong>${card.dataset.actionLabel||text(card.querySelector('.action-summary-title'))||'Tool'}</strong> <span>${card.dataset.actionTarget||text(card.querySelector('.action-summary-target'))||'No target shown'} · ${card.dataset.status||'ok'}</span>`;item.addEventListener('click',e=>{e.stopPropagation();card.scrollIntoView({block:'center',behavior:'smooth'});card.focus?.();card.dataset.pinnedRailFocused='true'});list.appendChild(item)});if(selected.length>4){const more=document.createElement('div');more.className='action-summary-pinned-rail-item';more.dataset.proof='pinned-action-rail-overflow';more.textContent=`${selected.length-4} more pinned actions hidden`;list.appendChild(more)}}
  function updateDigest(scope){const digest=scope.querySelector('.action-digest-card[data-owned-by="action-summaries"]');if(!digest)return;let state=digest.querySelector('.action-summary-pin-state');if(!state){state=document.createElement('span');state.className='action-summary-pin-state';state.dataset.proof='action-pin-count';digest.querySelector('.action-summary-head')?.appendChild(state)}const count=pinned(scope).length;state.textContent=`${count} pinned action${count===1?'':'s'}`;state.dataset.pinned=count?'true':'false';const actions=digest.querySelector('.action-digest-actions');if(actions&&!actions.querySelector('[data-action="copy-pinned-actions"]')){const b=document.createElement('button');b.type='button';b.className='mini-btn';b.textContent='copy pinned actions';b.dataset.action='copy-pinned-actions';b.dataset.proof='copy-pinned-actions';b.addEventListener('click',e=>{e.stopPropagation();copy(pinnedText(scope))});actions.appendChild(b)}renderRail(scope,digest);addProof(digest);addProof(document.body)}
  function enhance(card){if(!card||card.dataset.actionPinEnhanced==='true')return;card.dataset.actionPinEnhanced='true';card.dataset.actionPinned=card.dataset.actionPinned||'false';if(!card.hasAttribute('tabindex'))card.setAttribute('tabindex','-1');const actions=card.querySelector('.action-summary-actions');if(actions&&!actions.querySelector('[data-action="pin-action-summary"]')){const b=document.createElement('button');b.type='button';b.className='mini-btn';b.textContent='pin action';b.dataset.action='pin-action-summary';b.dataset.proof='action-digest-pin-visible pinned-action-summary';b.addEventListener('click',e=>{e.stopPropagation();const next=card.dataset.actionPinned!=='true';card.dataset.actionPinned=next?'true':'false';b.textContent=next?'unpin action':'pin action';updateDigest(card.closest('[data-component="session-turn"],.session-turn,.message,.assistant-message,.turn')||document.body)});actions.appendChild(b)}addProof(card)}
  function run(){document.querySelectorAll('.action-summary-card').forEach(enhance);const scopes=new Set([...document.querySelectorAll('.action-summary-card')].map(card=>card.closest('[data-component="session-turn"],.session-turn,.message,.assistant-message,.turn')||document.body));scopes.forEach(updateDigest)}
  const observer=new MutationObserver(run);observer.observe(document.documentElement,{childList:true,subtree:true,characterData:true});if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',run,{once:true});else run();
})();
</script>
