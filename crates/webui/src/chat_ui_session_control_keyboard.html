<style>
.session-control-keyboard-help{margin-top:.35rem;display:flex;gap:.35rem;align-items:center;flex-wrap:wrap;color:var(--muted);font-size:.72rem}
.session-control-key-chip{padding:.16rem .38rem;border:1px solid var(--border);border-radius:999px;color:var(--muted)}
.backend-session-control-event-row[data-session-keyboard-focus="true"]{outline:2px solid color-mix(in srgb,var(--accent,#7aa2ff) 55%,transparent);outline-offset:2px}
</style>
<script>
(function(){
  const PROOF='session-control-keyboard-nav session-control-keyboard-focus session-control-copy-focused-event session-control-next-error session-control-focus-search session-control-open-focused-event opencode-session-turn-keyboard-interaction';
  let focused=-1;
  function visibleRows(){return Array.from(document.querySelectorAll('.backend-session-control-event-row')).filter(row=>row.dataset.kind!=='overflow'&&row.dataset.sessionSearchHidden!=='true')}
  function mark(index){const rows=visibleRows();if(!rows.length){focused=-1;return}focused=Math.max(0,Math.min(index,rows.length-1));rows.forEach((row,i)=>{row.dataset.sessionKeyboardFocus=i===focused?'true':'false';if(i===focused)row.scrollIntoView({block:'nearest'})})}
  function focusedRow(){const rows=visibleRows();if(focused<0||focused>=rows.length)mark(0);return visibleRows()[focused]||null}
  function copyText(value){if(navigator.clipboard&&navigator.clipboard.writeText)return navigator.clipboard.writeText(value);const area=document.createElement('textarea');area.value=value;document.body.appendChild(area);area.select();document.execCommand('copy');area.remove();return Promise.resolve()}
  function note(text){if(typeof toast==='function')toast(text);document.querySelectorAll('.backend-session-control-status').forEach(el=>{el.textContent=text})}
  function controls(){const wrap=document.createElement('div');wrap.className='session-control-keyboard-help';wrap.dataset.proof=PROOF;const items=[['j/k','move event focus'],['e','next error'],['enter','open focused'],['c','copy focused'],['/','focus search']];for(const [key,label] of items){const chip=document.createElement('span');chip.className='session-control-key-chip';chip.dataset.proof='session-control-keyboard-nav';chip.textContent=`${key}: ${label}`;wrap.appendChild(chip)}return wrap}
  function enhance(){document.body?.setAttribute('data-proof',((document.body?.getAttribute('data-proof')||'')+' '+PROOF).trim());document.querySelectorAll('.session-head').forEach(head=>{if(!head.querySelector('.session-control-keyboard-help')){const search=head.querySelector('.session-control-ledger-search-box');const ledger=head.querySelector('.backend-session-control-ledger');const node=controls();if(search)search.insertAdjacentElement('afterend',node);else if(ledger)ledger.insertAdjacentElement('beforebegin',node);else head.appendChild(node)}});if(focused<0&&visibleRows().length)mark(0)}
  document.addEventListener('keydown',async e=>{const active=document.activeElement;if(active&&['INPUT','TEXTAREA'].includes(active.tagName)&&e.key!=='Escape')return;if(!document.querySelector('.backend-session-control-ledger'))return;if(e.key==='j'||e.key==='ArrowDown'){e.preventDefault();mark(focused+1)}else if(e.key==='k'||e.key==='ArrowUp'){e.preventDefault();mark(focused-1)}else if(e.key==='e'){e.preventDefault();const rows=visibleRows();const start=Math.max(0,focused+1);const next=rows.findIndex((row,i)=>i>=start&&row.dataset.status==='error');mark(next>=0?next:rows.findIndex(row=>row.dataset.status==='error'))}else if(e.key==='/'){e.preventDefault();document.querySelector('.session-control-ledger-search-input')?.focus()}else if(e.key==='Enter'){const row=focusedRow();const btn=row?.querySelector('[data-proof*="show-session-control-event"]');if(btn){e.preventDefault();btn.click();note('focused session control event toggled')}}else if(e.key==='c'){const row=focusedRow();const text=row?.getAttribute('data-session-control-event')||row?.textContent||'';if(text){e.preventDefault();await copyText(text);note('focused session control event copied')}}});
  const observer=new MutationObserver(()=>enhance());observer.observe(document.documentElement,{childList:true,subtree:true});if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',enhance,{once:true});else enhance();
})();
</script>
