name: Build Proof

on:
  pull_request:
    branches: [master, main, dev]
  workflow_dispatch:

jobs:
  build-proof:
    runs-on: ubuntu-latest
    env:
      NIM_KEY: ${{ secrets['NIM_KEY'] }}
      NVIDIA_NIM_API_KEY: ${{ secrets['NIM_KEY'] }}
      FORGE_BENCH_MAX_ROUNDS: "36"
      FORGE_BENCH_TIMEOUT_SECONDS: "540"
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: File line gate
        run: bash scripts/ci/check-file-lines.sh
      - name: Cargo check
        run: |
          set -o pipefail
          mkdir -p forge-proof/build
          cargo check --workspace --all-targets > /tmp/forge-cargo-check.log 2>&1 || {
            echo "cargo check failed; tail follows"
            tail -n 220 /tmp/forge-cargo-check.log | tee forge-proof/build/cargo-check-tail.txt
            exit 1
          }
          tail -n 40 /tmp/forge-cargo-check.log | tee forge-proof/build/cargo-check-tail.txt
      - name: Cargo test
        run: |
          set -o pipefail
          mkdir -p forge-proof/build
          cargo test --workspace --all-targets > /tmp/forge-cargo-test.log 2>&1 || {
            echo "cargo test failed; tail follows"
            tail -n 220 /tmp/forge-cargo-test.log | tee forge-proof/build/cargo-test-tail.txt
            exit 1
          }
          tail -n 40 /tmp/forge-cargo-test.log | tee forge-proof/build/cargo-test-tail.txt
      - name: WebUI smoke
        run: bash scripts/smoke/live-webui-feature-sprint.sh
      - name: Check full benchmark evidence
        if: always()
        run: |
          set -euo pipefail
          proof_dir="forge-proof/live-webui-feature-sprint"
          conversation="$proof_dir/full-benchmark-conversation.json"
          stream="$proof_dir/full-benchmark-stream.sse"
          checker="$proof_dir/full-benchmark-checker.json"
          workflow_checker="$proof_dir/opencode-workflow-checker.json"
          if [ ! -s "$conversation" ] || [ ! -s "$stream" ]; then
            mkdir -p "$proof_dir"
            printf '{"passed":false,"failed_checks":[{"name":"missing_full_benchmark_artifacts","passed":false}]}' > "$checker"
            printf '{"passed":false,"failed_checks":[{"name":"missing_full_benchmark_artifacts","passed":false}]}' > "$workflow_checker"
            echo "::error::missing full benchmark conversation or stream artifact"
            exit 1
          fi
          python3 scripts/smoke/check-full-agentic-benchmark.py "$conversation" "$stream" "$checker"
          jq -e '.passed == true' "$checker" >/dev/null
          python3 scripts/smoke/check-opencode-workflow-evidence.py "$conversation" "$stream" "$workflow_checker"
          jq -e '.passed == true' "$workflow_checker" >/dev/null
      - name: Upload proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-proof
          path: forge-proof/
