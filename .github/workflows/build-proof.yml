name: Build Proof

on:
  pull_request:
    branches: [master, main, dev]
  workflow_dispatch:

jobs:
  build-proof:
    runs-on: ubuntu-latest
    env:
      NIM_KEY: ${{ secrets['NIM_KEY'] }}
      NVIDIA_NIM_API_KEY: ${{ secrets['NIM_KEY'] }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: File line gate
        run: bash scripts/ci/check-file-lines.sh
      - name: Cargo check
        run: cargo check --workspace --all-targets
      - name: Cargo test
        run: cargo test --workspace --all-targets
      - name: WebUI smoke
        run: bash scripts/smoke/live-webui-feature-sprint.sh
      - name: Upload proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-proof
          path: forge-proof/
