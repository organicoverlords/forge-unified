name: CI

on:
  push:
    branches: [master, main, dev]
  pull_request:
    branches: [master, main, dev]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        continue-on-error: true
        run: cargo fmt --all -- --check

      - name: Run clippy
        continue-on-error: true
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Check build
        run: cargo check --workspace --all-targets

      - name: Build release
        run: cargo build --workspace --release

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test --workspace --all-targets

      - name: Run doc tests
        run: cargo test --doc --workspace

  size-check:
    name: File Size Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enforce source file line limit
        run: bash scripts/ci/check-file-lines.sh

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Validate WebUI proof harness
        run: |
          set -euo pipefail
          mkdir -p forge-proof/webui-smoke
          bash -n scripts/smoke/live-webui-feature-sprint.sh
          bash -n scripts/smoke/capture-browser-proof.sh
          python3 -m py_compile scripts/smoke/check-full-agentic-benchmark.py
          python3 -m py_compile scripts/smoke/check-opencode-workflow-evidence.py
          if [ -f scripts/smoke/check-live-webui-proof-manifest.py ]; then
            python3 -m py_compile scripts/smoke/check-live-webui-proof-manifest.py
          fi
          printf 'Full natural-language WebUI/NVIDIA NIM proof is owned by the dedicated Live WebUI Feature Sprint workflow. CI smoke validates the harness deterministically to avoid triple-running a flaky long provider benchmark.\n' > forge-proof/webui-smoke/ci-smoke-scope.txt

      - name: Upload WebUI proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: webui-smoke-proof
          path: forge-proof/webui-smoke/

      - name: Test help output
        run: |
          cargo build -p forge-app
          ./target/debug/forge --help

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo-audit
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
          key: ${{ runner.os }}-cargo-audit-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-audit
        env:
          RUSTFLAGS: ""
        run: |
          if ! command -v cargo-audit >/dev/null 2>&1; then
            cargo install cargo-audit --locked
          fi
          cargo audit --version

      - name: Run audit
        run: cargo audit

  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-deny
        run: cargo install cargo-deny

      - name: Check licenses
        continue-on-error: true
        run: cargo deny check licenses

      - name: Check bans
        continue-on-error: true
        run: cargo deny check bans

      - name: Check sources
        continue-on-error: true
        run: cargo deny check sources
