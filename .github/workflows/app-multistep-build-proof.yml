name: App Multistep Build Proof

on:
  pull_request:
    branches: [master, main, dev]
  workflow_dispatch:

jobs:
  app-multistep-build-proof:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NIM_KEY: ${{ secrets['NIM_KEY'] }}
      NVIDIA_NIM_API_KEY: ${{ secrets['NIM_KEY'] }}
      FORGE_APP_BUILD_MULTI_OUT: forge-proof/app-multistep-build-proof
      FORGE_APP_BUILD_MULTI_TIMEOUT_SECONDS: "300"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-app-multistep-cargo-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('crates/**/*.rs', 'Cargo.toml', 'crates/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-app-multistep-cargo-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-app-multistep-cargo-
            ${{ runner.os }}-app-build-cargo-

      - name: Build multistep artifact through WebUI
        run: bash scripts/smoke/app-build-multistep.sh

      - name: Upload multistep app build proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-multistep-build-proof
          path: forge-proof/app-multistep-build-proof/
