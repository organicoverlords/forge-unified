name: App Build Proof

on:
  pull_request:
    branches: [master, main, dev]
  workflow_dispatch:

jobs:
  app-build-proof:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NIM_KEY: ${{ secrets['NIM_KEY'] }}
      NVIDIA_NIM_API_KEY: ${{ secrets['NIM_KEY'] }}
      FORGE_NATURAL_OUT: forge-proof/app-build-proof
      FORGE_NATURAL_TITLE: build one proof artifact with Forge WebUI
      FORGE_NATURAL_MAX_ROUNDS: "5"
      FORGE_NATURAL_TIMEOUT_SECONDS: "240"
      FORGE_NATURAL_PROMPT: |
        Build exactly one tiny repo artifact through the normal WebUI tools. Do not do broad repo analysis.

        Required steps:
        1. Read `PROJECT_STATE.md` once.
        2. Create or update `docs/generated/proof/app-built-one-file.md` with this exact marker: `APP_BUILD_PROOF_WEBUI_NIM`.
        3. Update `PROJECT_STATE.md` with one dated bullet saying the app-build proof created `docs/generated/proof/app-built-one-file.md` through the WebUI.
        4. Run exactly: `bash -n scripts/smoke/natural-feature-work.sh 2>&1`.
        5. Final answer must include files modified, tests run, unresolved risks, and confidence.
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-app-build-cargo-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('crates/**/*.rs', 'Cargo.toml', 'crates/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-app-build-cargo-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-app-build-cargo-

      - name: Build something through WebUI
        run: bash scripts/smoke/natural-feature-work.sh

      - name: Upload app build proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-build-proof
          path: forge-proof/app-build-proof/
